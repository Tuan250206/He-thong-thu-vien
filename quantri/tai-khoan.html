<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Hệ Thống - Đăng Nhập</title>
    <link rel="stylesheet" href="style.css">
    <style>
        input[type="password"], input[type="email"] { 
            width: 98%; padding: 7px; margin: 3px 0; border: 1px solid #ddd; font-size: 13px; 
        }
        .search-box { padding: 8px; width: 250px; border: 1px solid #ddd; font-size: 13px; }
    </style>
</head>
<body>
    <div id="header">
        <h1>🏢 Quản Trị Hệ Thống - Đăng Nhập</h1>
        <div class="userInfo">
            Xin chào: <strong id="tenAdmin">Admin</strong>
            <a href="login.html" onclick="dangXuat()">Đăng xuất</a>
        </div>
    </div>
    
    <div id="sidebar">

        <a class="active" href="tai-khoan.html">👥 Quản lý tài khoản</a>
    </div>
    
    <div id="content">
        
        <div class="section">
            <h3>👥 Thêm / Phân quyền tài khoản nhân viên</h3>
            
            <form id="formTaiKhoan" onsubmit="luuTaiKhoan(); return false;">
                <div class="form-row">
                    <div class="col2">
                        <label>Tên đăng nhập (Username): <span class="required">*</span></label>
                        <input type="text" id="username" placeholder="VD: thuthu_01" required>
                    </div>
                    <div class="col2">
                        <label>Mật khẩu: <span class="required">*</span></label>
                        <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="col2">
                        <label>Họ và tên nhân viên: <span class="required">*</span></label>
                        <input type="text" id="hoTen" required>
                    </div>
                    <div class="col2">
                        <label>Số điện thoại liên hệ:</label>
                        <input type="text" id="sdtNv">
                    </div>
                </div>

                <div class="form-row">
                    <div class="col2">
                        <label>Email:</label>
                        <input type="email" id="emailNv">
                    </div>
                    <div class="col2">
                        <label>Trạng thái hoạt động:</label>
                        <select id="trangThai">
                            <option value="Hoạt động">🟢 Đang hoạt động</option>
                            <option value="Khóa">🔴 Khóa tài khoản</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="col2">
                        <label class="warn">Vai trò / Phân quyền hệ thống: <span class="required">*</span></label>
                        <select id="vaiTro" required>
                            <option value="">-- Chọn vai trò --</option>
                            <option value="Thủ kho">Thủ kho </option>
                            <option value="Thủ thư">Thủ thư </option>
                            <option value="Admin">Quản trị viên</option>
                        </select>
                    </div>
                </div>
                
                <div style="margin-top: 15px;">
                    <button type="submit">💾 Lưu tài khoản</button>
                    <button type="reset" class="btn-danger">❌ Hủy / Làm lại</button>
                </div>
            </form>
        </div>

        <div class="section">
            <div style="overflow: hidden; margin-bottom: 15px;">
                <h3 style="float: left; border: none; padding: 0; margin: 0; line-height: 35px;">📋 Danh sách tài khoản hệ thống</h3>
                <div style="float: right;">
                    <input type="text" id="timKiemTK" class="search-box" placeholder="Tìm tên hoặc username...">
                    <button type="button" onclick="timKiem()" style="margin-right: 0;">🔍 Tìm</button>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 5%;">STT</th>
                        <th style="width: 15%;">Username</th>
                        <th style="width: 25%;">Họ và tên</th>
                        <th style="width: 20%;">Phân quyền</th>
                        <th style="width: 15%;">Trạng thái</th>
                        <th style="width: 20%; text-align: center;">Thao tác</th>
                    </tr>
                </thead>
                
                <tbody id="danhSachTK">
                    
                </tbody>
            </table>
        </div>
        
    </div>
    
    <script src="script.js"></script>
  
</body>
</html>
