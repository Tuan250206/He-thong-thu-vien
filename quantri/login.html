<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Trị Hệ Thống - Đăng Nhập</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="wrap">
        <div class="box">
            <h2 style="color: #FF9800; margin-bottom: 5px;">QUẢN TRỊ HỆ THỐNG</h2>
            <p style="text-align: center; color: #666; font-size: 14px; margin-bottom: 20px;">Đăng nhập cấp cao</p>
            
            <div class="err" id="errMsg" style="display: none; color: red; text-align: center; margin-bottom: 15px;">
                Tên đăng nhập hoặc mật khẩu không đúng!
            </div>
            
            <label>Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Nhập tên đăng nhập">
            
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu">
            
            <button onclick="dangNhapSuperAdmin()" style="background-color: #FF9800;">Đăng nhập</button>
            
            <div class="link" style="text-align: center; margin-top: 15px;">
                <a href="../index.html">← Trang chủ thư viện</a>
            </div>
        </div>
    </div>
    
    
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
