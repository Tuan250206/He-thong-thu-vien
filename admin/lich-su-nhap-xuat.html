<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử nhập xuất - Quản lý kho</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="header">
        <h1>🏢 Hệ Thống Quản Lý Kho - ADMIN</h1>
        <div class="userInfo">
            Xin chào: <strong id="tenAdmin">Admin</strong>
            <a href="login.html" onclick="dangXuat()">Đăng xuất</a>
        </div>
    </div>
    
    <div id="sidebar">
        <a href="dashboard.html">🏠 Trang chủ</a>
        <a href="sach-them.html">➕ Thêm sách</a>
        <a href="sach-sua.html">✏️ Sửa sách</a>
        <a href="bien-muc.html">📋 Biên mục</a>
        <a href="in-barcode.html">🏷️ In tem sách</a>
        <a href="kiem-ke.html">📊 Kiểm kê</a>
        <a href="nhap-kho-danh-sach.html">📥 Phiếu nhập</a>
        <a href="xuat-kho-danh-sach.html">📤 Phiếu xuất</a>
        <a href="ncc-danh-sach.html">🏭 Nhà cung cấp</a>
        <a class="active" href="lich-su-nhap-xuat.html">📋 Lịch sử</a>
        <a href="thong-ke-ton-kho.html">📊 Thống kê</a>
       
    </div>
    
    <div id="content">
        <h2>📋 Lịch sử nhập/xuất kho</h2>
        
        <div class="filter-box">
            <div class="filter-group">
                <label>Loại phiếu:</label>
                <select id="loaiPhieu">
                    <option value="all">Tất cả</option>
                    <option value="nhap">Phiếu nhập</option>
                    <option value="xuat">Phiếu xuất</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>Từ ngày:</label>
                <input type="date" id="tuNgay">
            </div>
            
            <div class="filter-group">
                <label>Đến ngày:</label>
                <input type="date" id="denNgay">
            </div>
            
            <div class="filter-actions">
                <button class="btn-primary" onclick="locLichSu()" style="background-color: #4CAF50;">🔍 Lọc</button>
                <button class="btn-primary" onclick="xemTatCaLichSu()" style="background-color: #6c757d;">📋 Xem tất cả</button>
            </div>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Loại</th>
                    <th>Mã phiếu</th>
                    <th>Ngày</th>
                    <th>NCC/Lý do</th>
                    <th>SL sách</th>
                    <th>Giá trị</th>
                    <th>Người lập</th>
                </tr>
            </thead>
            <tbody id="ketQuaLichSu">
                <tr>
                    <td colspan="7" style="text-align: center;">Đang tải...</td>
                </tr>
            </tbody>
        </table>
        
        <div id="tongKet" class="summary-box">
        </div>
    </div>
  
    <script src="script.js"></script>
    
</body>
</html>
