<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Kho - Đăng Nhập</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="wrap">
        <div class="box">
            <h2>QUẢN LÝ KHO - ĐĂNG NHẬP</h2>
            <div class="err" id="errMsg">Tên đăng nhập hoặc mật khẩu không đúng!</div>
            
            <label>Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Nhập tên đăng nhập">
            
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu">
            
            <button onclick="dangNhap()">Đăng nhập</button>
            <div class="link"><a href="../index.html">← Trang chủ thư viện</a></div>
        </div>
    </div>
    <script src="data.js"></script>
    <script>
        function dangNhap() {
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var admins = JSON.parse(localStorage.getItem('admins') || '[]');
            var found = null;
            
            for (var i = 0; i < admins.length; i++) {
                if (admins[i].username === username && admins[i].password === password) {
                    found = admins[i];
                    break;
                }
            }
            
            if (found) {
                localStorage.setItem('currentAdmin', username);
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errMsg').style.display = 'block';
            }
        }
    </script>
    
</body>
</html>
