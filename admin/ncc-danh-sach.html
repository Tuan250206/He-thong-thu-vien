<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách nhà cung cấp - Quản lý kho</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 15px 20px;
        }
        
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        
        .sidebar {
            width: 200px;
            background-color: #fff;
            float: left;
            min-height: 500px;
            border-right: 1px solid #ddd;
        }
        
        .sidebar a {
            display: block;
            padding: 10px 15px;
            text-decoration: none;
            color: #333;
            border-bottom: 1px solid #eee;
        }
        
        .sidebar a:hover {
            background-color: #e8f5e9;
        }
        
        .content {
            margin-left: 220px;
            padding: 20px;
            background-color: white;
            min-height: 500px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table th {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: left;
        }
        
        table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin-right: 10px;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        .btn-primary {
            background-color: #2196F3;
        }
        
        .btn-danger {
            background-color: #f44336;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏢 Hệ Thống Quản Lý Kho - ADMIN</h1>
        <span>Xin chào: <strong id="username">Admin</strong> | <a href="login.html" style="color: white;">Đăng xuất</a></span>
    </div>
    
    <div class="sidebar">
        <a href="dashboard.html">🏠 Trang chủ</a>
        <a href="sach-them.html">➕ Thêm sách</a>
        <a href="sach-sua.html">✏️ Sửa sách</a>
        <a href="bien-muc.html">📋 Biên mục</a>
        <a href="in-barcode.html">🏷️ In tem sách</a>
        <a href="kiem-ke.html">📊 Kiểm kê</a>
        <a href="nhap-kho-danh-sach.html">📥 Phiếu nhập</a>
        <a href="xuat-kho-danh-sach.html">📤 Phiếu xuất</a>
        <a href="ncc-danh-sach.html" style="background-color: #e8f5e9;">🏭 Nhà cung cấp</a>
        <a href="lich-su-nhap-xuat.html">📋 Lịch sử</a>
        <a href="thong-ke-ton-kho.html">📊 Thống kê</a>
    </div>
    
    <div class="content">
        <h2>🏭 Danh sách nhà cung cấp</h2>
        
        <button onclick="window.location.href='ncc-them.html'">➕ Thêm nhà cung cấp mới</button>
        
        <table style="margin-top: 20px;">
            <thead>
                <tr>
                    <th>Mã NCC</th>
                    <th>Tên nhà cung cấp</th>
                    <th>Địa chỉ</th>
                    <th>Điện thoại</th>
                    <th>Email</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="danhSachNCC">
                <tr>
                    <td colspan="6" style="text-align: center;">Đang tải...</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <script>
        function kiemTraDangNhap() {
            var admin = localStorage.getItem('currentAdmin');
            if (!admin) {
                alert('Bạn chưa đăng nhập!');
                window.location.href = 'login.html';
            } else {
                document.getElementById('username').innerText = admin;
            }
        }
        
        function loadDanhSach() {
            var ncc = JSON.parse(localStorage.getItem('danhSachNCC') || '[]');
            var html = '';
            
            if (ncc.length === 0) {
                html = '<tr><td colspan="6" style="text-align: center;">Chưa có nhà cung cấp nào</td></tr>';
            } else {
                for (var i = 0; i < ncc.length; i++) {
                    html += '<tr>';
                    html += '<td>' + ncc[i].maNCC + '</td>';
                    html += '<td>' + ncc[i].tenNCC + '</td>';
                    html += '<td>' + (ncc[i].diaChi || '') + '</td>';
                    html += '<td>' + (ncc[i].sdt || '') + '</td>';
                    html += '<td>' + (ncc[i].email || '') + '</td>';
                    html += '<td>';
                    html += '<button onclick="sua(' + i + ')" class="btn-primary">✏️ Sửa</button> ';
                    html += '<button onclick="xoa(' + i + ')" class="btn-danger">🗑️ Xóa</button>';
                    html += '</td>';
                    html += '</tr>';
                }
            }
            
            document.getElementById('danhSachNCC').innerHTML = html;
        }
        
        function sua(index) {
            localStorage.setItem('nccSua', index);
            window.location.href = 'ncc-them.html';
        }
        
        function xoa(index) {
            if (!confirm('Xác nhận xóa nhà cung cấp này?')) {
                return;
            }
            
            var ncc = JSON.parse(localStorage.getItem('danhSachNCC') || '[]');
            ncc.splice(index, 1);
            localStorage.setItem('danhSachNCC', JSON.stringify(ncc));
            
            alert('✅ Đã xóa!');
            loadDanhSach();
        }
        
        kiemTraDangNhap();
        loadDanhSach();
    </script>
</body>
</html>
