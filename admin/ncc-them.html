<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm/Sửa nhà cung cấp - Quản lý kho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1>🏢 Hệ Thống Quản Lý Kho - ADMIN</h1>
        <div class="userInfo">
            Xin chào: <strong id="tenAdmin">Admin</strong>
            <a href="login.html" onclick="dangXuat()">Đăng xuất</a>
        </div>
    </div>
    
    <div id="sidebar">
        <a href="dashboard.html">🏠 Trang chủ</a>
        <a href="sach-them.html">➕ Thêm sách</a>
        <a href="sach-sua.html">✏️ Sửa sách</a>
        <a href="bien-muc.html">📋 Biên mục</a>
        <a href="in-barcode.html">🏷️ In tem sách</a>
        <a href="kiem-ke.html">📊 Kiểm kê</a>
        <a href="nhap-kho-danh-sach.html">📥 Phiếu nhập</a>
        <a href="xuat-kho-danh-sach.html">📤 Phiếu xuất</a>
        <a class="active" href="ncc-danh-sach.html">🏭 Nhà cung cấp</a>
        <a href="lich-su-nhap-xuat.html">📋 Lịch sử</a>
        <a href="thong-ke-ton-kho.html">📊 Thống kê</a>
        
    </div>
    
    <div id="content">
        <h2 id="tieuDeNCC">➕ Thêm nhà cung cấp mới</h2>
        
        <form id="formNCC" class="section" onsubmit="luuNCC(); return false;">
            
            <div class="form-row">
                <div class="col2">
                    <label>Mã NCC: <span class="required">*</span></label>
                    <input type="text" id="maNCC" required>
                </div>
                <div class="col2">
                    <label>Tên nhà cung cấp: <span class="required">*</span></label>
                    <input type="text" id="tenNCC" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="col2">
                    <label>Loại:</label>
                    <select id="loaiNCC">
                        <option value="Nhà xuất bản">Nhà xuất bản</option>
                        <option value="Nhà phân phối">Nhà phân phối</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
                <div class="col2">
                    <label>Người liên hệ:</label>
                    <input type="text" id="nguoiLienHe">
                </div>
            </div>
            
            <label>Địa chỉ:</label>
            <textarea id="diaChi" rows="2"></textarea>
            
            <div class="form-row">
                <div class="col3">
                    <label>Điện thoại:</label>
                    <input type="text" id="sdt">
                </div>
                <div class="col3">
                    <label>Email:</label>
                    <input type="email" id="email">
                </div>
                <div class="col3">
                    <label>Mã số thuế:</label>
                    <input type="text" id="mst">
                </div>
            </div>
            
            <label>Website:</label>
            <input type="text" id="website">
            
            <div style="margin-top: 20px;">
                <button type="submit">💾 Lưu dữ liệu</button>
                <button type="button" onclick="window.location.href='ncc-danh-sach.html'" class="btn-danger">❌ Hủy bỏ</button>
            </div>
        </form>
    </div>
 
    <script src="script.js"></script>
</body>
</html>
