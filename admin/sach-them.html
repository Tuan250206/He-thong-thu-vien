<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm sách - Quản lý kho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1>🏢 Hệ Thống Quản Lý Kho - ADMIN</h1>
        <div class="userInfo">
            Xin chào: <strong id="tenAdmin">Admin</strong>
            <a href="login.html" onclick="dangXuat()">Đăng xuất</a>
        </div>
    </div>
    
    <div id="sidebar">
        <a href="dashboard.html">🏠 Trang chủ</a>
        <a class="active" href="sach-them.html">➕ Thêm sách</a>
        <a href="sach-sua.html">✏️ Sửa sách</a>
        <a href="bien-muc.html">📋 Biên mục</a>
        <a href="in-barcode.html">🏷️ In tem sách</a>
        <a href="kiem-ke.html">📊 Kiểm kê</a>
        <a href="nhap-kho-danh-sach.html">📥 Phiếu nhập</a>
        <a href="xuat-kho-danh-sach.html">📤 Phiếu xuất</a>
        <a href="ncc-danh-sach.html">🏭 Nhà cung cấp</a>
        <a href="lich-su-nhap-xuat.html">📋 Lịch sử</a>
        <a href="thong-ke-ton-kho.html">📊 Thống kê</a>
         <hr style="border-top: 1px solid #ccc; margin: 10px 0;"> <a href="tai-khoan.html">👥 Quản lý tài khoản</a> 
    </div>
    
    <div id="content">
        <h2>➕ Thêm sách mới vào kho</h2>
        
        <form class="section" onsubmit="luuSachMoi(); return false;">
            <div class="form-row">
                <div class="col2">
                    <label>Mã sách (Tự động tạo)</label>
                    <input type="text" id="maSachThem" readonly style="background: #e2e8f0; font-weight: bold; color: #16a34a;">
                </div>
                <div class="col2">
                    <label>Thể loại <span class="required">*</span></label>
                    <select id="theLoaiThem" onchange="hienThiTheLoaiKhac(this.value)">
                        <option value="CNTT">Công nghệ thông tin</option>
                        <option value="Toán">Toán học</option>
                        <option value="Vật lý">Vật lý</option>
                        <option value="Hóa học">Hóa học</option>
                        <option value="Sinh học">Sinh học</option>
                        <option value="Ngôn ngữ">Ngôn ngữ</option>
                        <option value="Văn học">Văn học</option>
                        <option value="Lịch sử">Lịch sử</option>
                        <option value="Địa lý">Địa lý</option>
                        <option value="Kinh tế">Kinh tế</option>
                        <option value="Khác">Khác</option>
                    </select>
                    <input type="text" id="theLoaiKhacThem" placeholder="Nhập thể loại mới..." style="display: none; margin-top: 8px;">
                </div>
            </div>
            
            <label>Tên sách <span class="required">*</span></label>
            <input type="text" id="tenSachThem" placeholder="Nhập tên sách..." required>
            
            <div class="form-row">
                <div class="col2">
                    <label>Tác giả <span class="required">*</span></label>
                    <input type="text" id="tacGiaThem" placeholder="Tên tác giả..." required>
                </div>
                <div class="col2">
                    <label>Nhà xuất bản <span class="required">*</span></label>
                    <input type="text" id="nxbThem" placeholder="Tên nhà xuất bản..." required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="col2">
                    <label>Năm xuất bản</label>
                    <input type="number" id="namXBThem" placeholder="Ví dụ: 2024" min="1900" max="2099">
                </div>
                <div class="col2">
                    <label>Mã ISBN</label>
                    <input type="text" id="isbnThem" placeholder="Ví dụ: 978-xxx-xxx-xxx-x">
                </div>
            </div>
            
            <div class="form-row">
                <div class="col2">
                    <label>Số trang</label>
                    <input type="number" id="soTrangThem" placeholder="Ví dụ: 300" min="1">
                </div>
                <div class="col2">
                    <label>Ngôn ngữ</label>
                    <select id="ngonNguThem">
                        <option value="Tiếng Việt">Tiếng Việt</option>
                        <option value="Tiếng Anh">Tiếng Anh</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row" style="background: #f0fdf4; padding: 10px; border-radius: 6px; margin-bottom: 15px;">
                <div class="col2">
                    <label style="color: #16a34a;">Số lượng nhập ban đầu <span class="required">*</span></label>
                    <input type="number" id="soLuongThem" placeholder="Ví dụ: 10" min="1" required>
                </div>
                <div class="col2">
                    <label>Vị trí kệ</label>
                    <input type="text" id="viTriThem" placeholder="Ví dụ: A-2-15">
                </div>
            </div>
            
            <div class="form-row">
                <div class="col2">
                    <label>Giá nhập (VNĐ) <span class="required">*</span></label>
                    <input type="number" id="giaNhapThem" placeholder="Ví dụ: 80000" min="0" required>
                </div>
                <div class="col2">
                    <label>Giá bồi thường (VNĐ) <span class="required">*</span></label>
                    <input type="number" id="giaBTThem" placeholder="Ví dụ: 120000" min="0" required>
                </div>
            </div>
            
            <label>Mô tả ngắn</label>
            <textarea id="moTaThem" placeholder="Mô tả nội dung, tình trạng sách..." rows="3"></textarea>
            
            <div style="margin-top: 20px;">
                <button type="submit" style="padding: 12px 25px; font-size: 15px;">💾 Lưu sách vào kho</button>
                <button type="button" class="btn-danger" style="padding: 12px 25px; font-size: 15px; margin-left: 10px;" onclick="window.location.href='dashboard.html'">❌ Hủy bỏ</button>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
