<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In tem sách - Quản lý kho</title>
    <style>
        /* CSS ĐƠN GIẢN - INLINE */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        
        /* Header */
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 15px 20px;
        }
        
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        
        /* Menu bên trái */
        .sidebar {
            width: 200px;
            background-color: #fff;
            float: left;
            min-height: 500px;
            border-right: 1px solid #ddd;
        }
        
        .sidebar a {
            display: block;
            padding: 10px 15px;
            text-decoration: none;
            color: #333;
            border-bottom: 1px solid #eee;
        }
        
        .sidebar a:hover {
            background-color: #e8f5e9;
        }
        
        /* Nội dung chính */
        .content {
            margin-left: 220px;
            padding: 20px;
            background-color: white;
            min-height: 500px;
        }
        
        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        table th {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            text-align: left;
        }
        
        table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        
        /* Button */
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin-right: 10px;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        .tem-sach {
            border: 2px solid #333;
            padding: 15px;
            margin: 10px;
            width: 250px;
            display: inline-block;
            text-align: center;
        }
        
        @media print {
            .sidebar, .header, button {
                display: none;
            }
            .content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>🏢 Hệ Thống Quản Lý Kho - ADMIN</h1>
        <span>Xin chào: <strong id="username">Admin</strong> | <a href="login.html" style="color: white;">Đăng xuất</a></span>
    </div>
    
    <!-- Sidebar Menu -->
    <div class="sidebar">
        <a href="dashboard.html">🏠 Trang chủ</a>
        <a href="sach-them.html">➕ Thêm sách</a>
        <a href="sach-sua.html">✏️ Sửa sách</a>
        <a href="bien-muc.html">📋 Biên mục</a>
        <a href="in-barcode.html" style="background-color: #e8f5e9;">🏷️ In tem sách</a>
        <a href="kiem-ke.html">📊 Kiểm kê</a>
        <a href="nhap-kho-danh-sach.html">📥 Phiếu nhập</a>
        <a href="xuat-kho-danh-sach.html">📤 Phiếu xuất</a>
        <a href="ncc-danh-sach.html">🏭 Nhà cung cấp</a>
        <a href="lich-su-nhap-xuat.html">📋 Lịch sử</a>
        <a href="thong-ke-ton-kho.html">📊 Thống kê</a>
    </div>
    
    <!-- Nội dung chính -->
    <div class="content">
        <h2>🏷️ In tem sách</h2>
        
        <p>Chọn sách cần in tem:</p>
        
        <table id="tableSach">
            <thead>
                <tr>
                    <th style="width: 50px;"><input type="checkbox" id="checkAll" onclick="chonTatCa()"></th>
                    <th>Mã sách</th>
                    <th>Tên sách</th>
                    <th>Vị trí</th>
                </tr>
            </thead>
            <tbody id="danhSachSach">
                <tr>
                    <td colspan="4" style="text-align: center;">Đang tải...</td>
                </tr>
            </tbody>
        </table>
        
        <div style="margin-top: 20px;">
            <button onclick="xemTruoc()">👁️ Xem trước</button>
            <button onclick="inTem()">🖨️ In tem</button>
        </div>
        
        <div id="previewTem" style="margin-top: 20px; display: none;">
            <h3>Xem trước:</h3>
            <div id="noiDungTem"></div>
        </div>
    </div>
    
    <script>
        // JAVASCRIPT ĐƠN GIẢN - ES5
        
        // Kiểm tra đăng nhập
        function kiemTraDangNhap() {
            var admin = localStorage.getItem('currentAdmin');
            if (!admin) {
                alert('Bạn chưa đăng nh��p!');
                window.location.href = 'login.html';
            } else {
                document.getElementById('username').innerText = admin;
            }
        }
        
        // Load danh sách sách
        function loadDanhSach() {
            var sach = JSON.parse(localStorage.getItem('danhSachSach') || '[]');
            var html = '';
            
            if (sach.length === 0) {
                html = '<tr><td colspan="4" style="text-align: center;">Chưa có sách nào</td></tr>';
            } else {
                for (var i = 0; i < sach.length; i++) {
                    html += '<tr>';
                    html += '<td><input type="checkbox" class="chkSach" value="' + i + '"></td>';
                    html += '<td>' + sach[i].maSach + '</td>';
                    html += '<td>' + sach[i].tenSach + '</td>';
                    html += '<td>' + (sach[i].viTri || 'Chưa xác định') + '</td>';
                    html += '</tr>';
                }
            }
            
            document.getElementById('danhSachSach').innerHTML = html;
        }
        
        // Chọn tất cả
        function chonTatCa() {
            var checkboxes = document.getElementsByClassName('chkSach');
            var checkAll = document.getElementById('checkAll').checked;
            for (var i = 0; i < checkboxes.length; i++) {
                checkboxes[i].checked = checkAll;
            }
        }
        
        // Xem trước tem
        function xemTruoc() {
            var sach = JSON.parse(localStorage.getItem('danhSachSach') || '[]');
            var checkboxes = document.getElementsByClassName('chkSach');
            var html = '';
            var dem = 0;
            
            for (var i = 0; i < checkboxes.length; i++) {
                if (checkboxes[i].checked) {
                    var index = checkboxes[i].value;
                    var s = sach[index];
                    html += '<div class="tem-sach">';
                    html += '<div style="font-weight: bold; font-size: 16px; border-bottom: 2px solid #333; padding-bottom: 5px; margin-bottom: 10px;">THƯ VIỆN ABC</div>';
                    html += '<div style="margin: 10px 0;">' + s.tenSach + '</div>';
                    html += '<div style="margin: 5px 0;">Mã: <strong>' + s.maSach + '</strong></div>';
                    html += '<div style="margin: 5px 0;">Vị trí: ' + (s.viTri || 'N/A') + '</div>';
                    html += '</div>';
                    dem++;
                }
            }
            
            if (html === '') {
                alert('Vui lòng chọn ít nhất 1 sách!');
                return;
            }
            
            document.getElementById('noiDungTem').innerHTML = html;
            document.getElementById('previewTem').style.display = 'block';
        }
        
        // In tem
        function inTem() {
            xemTruoc();
            setTimeout(function() {
                window.print();
            }, 500);
        }
        
        // Gọi khi load trang
        kiemTraDangNhap();
        loadDanhSach();
    </script>
</body>
</html>
