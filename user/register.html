<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Thủ Thư</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #e3f2fd;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
}

.tieu-de-trang {
    background: #2196F3;
    color: white;
    text-align: center;
    padding: 14px 20px;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 0.5px;
}

.hop-dang-ky {
    background: white;
    border-radius: 10px;
    padding: 40px 40px 35px;
    width: 480px;
    margin: 50px auto 0;
    box-shadow: 0 6px 20px rgba(33,150,243,0.18);
}

.bieu-tuong-form {
    text-align: center;
    font-size: 44px;
    margin-bottom: 10px;
}

h2 {
    text-align: center;
    color: #1565C0;
    margin-bottom: 25px;
    font-size: 22px;
}

.nhom-nhap {
    margin-bottom: 18px;
}

/* ← THÊM MỚI CHO MẬT KHẨU */
.nhom-nhap-mat-khau {
    margin-bottom: 18px;
    display: flex;
    gap: 4%;
}

label {
    display: block;
    color: #444;
    margin-bottom: 6px;
    font-size: 14px;
    font-weight: bold;
}

.bat-buoc {
    color: #e53935;
    margin-left: 2px;
}

input[type="text"],
input[type="password"],
input[type="email"],
input[type="tel"] {
    width: 100%;
    padding: 10px 13px;
    border: 2px solid #e0e0e0;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    color: #333;
}

input[type="text"]:focus,
input[type="password"]:focus,
input[type="email"]:focus,
input[type="tel"]:focus {
    border-color: #2196F3;
    box-shadow: 0 0 0 3px rgba(33,150,243,0.12);
}

.hai-cot {
    width: 48%;
}

.nut-dang-ky {
    width: 100%;
    padding: 13px;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.nut-dang-ky:hover {
    background: #1976D2;
}

.nut-dang-ky:active {
    background: #1565C0;
}

.lien-ket {
    text-align: center;
    margin-top: 22px;
}

.lien-ket a {
    color: #2196F3;
    text-decoration: none;
    font-size: 14px;
    font-weight: bold;
}

.lien-ket a:hover {
    text-decoration: underline;
}

.thong-bao-loi {
    background: #ffebee;
    color: #b71c1c;
    border: 1px solid #ef9a9a;
    padding: 11px 14px;
    border-radius: 6px;
    margin-bottom: 18px;
    font-size: 14px;
    display: none;
}

.goi-y {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
}

.duong-phan-cach {
    border: none;
    border-top: 1px solid #e0e0e0;
    margin: 18px 0 16px;
}
    </style>
</head>
<body>

    <div class="tieu-de-trang">📚 HỆ THỐNG QUẢN LÝ THƯ VIỆN</div>

    <div class="hop-dang-ky">
        <div class="bieu-tuong-form">📝</div>
        <h2>Đăng Ký Tài Khoản</h2>

        <div id="thongBaoLoi" class="thong-bao-loi"></div>

        <form onsubmit="dangKy(); return false;">

            <div class="nhom-nhap">
                <label for="hoTen">Họ và tên <span class="bat-buoc">*</span></label>
                <input type="text" id="hoTen" placeholder="Nhập họ và tên đầy đủ" autocomplete="name" />
            </div>

            <div class="nhom-nhap">
                <label for="tenDangNhap">Tên đăng nhập <span class="bat-buoc">*</span></label>
                <input type="text" id="tenDangNhap" placeholder="Không dấu, không khoảng trắng" autocomplete="username" />
                <div class="goi-y">Chỉ dùng chữ cái, chữ số và dấu gạch dưới (_)</div>
            </div>

            <!-- ← THAY ĐỔI CHỖ NÀY -->
            <div class="nhom-nhap-mat-khau">
                <div class="hai-cot">
                    <label for="matKhau">Mật khẩu <span class="bat-buoc">*</span></label>
                    <input type="password" id="matKhau" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password" />
                </div>
                
                <div class="hai-cot">
                    <label for="xacNhanMatKhau">Xác nhận mật khẩu <span class="bat-buoc">*</span></label>
                    <input type="password" id="xacNhanMatKhau" placeholder="Nhập lại mật khẩu" autocomplete="new-password" />
                </div>
            </div>

            <div class="nhom-nhap">
                <label for="email">Email <span class="bat-buoc">*</span></label>
                <input type="email" id="email" placeholder="example@email.com" autocomplete="email" />
            </div>

            <div class="nhom-nhap">
                <label for="sdt">Số điện thoại <span class="bat-buoc">*</span></label>
                <input type="tel" id="sdt" placeholder="09xxxxxxxx" autocomplete="tel" />
            </div>

            <button type="submit" class="nut-dang-ky">✅ Đăng ký tài khoản</button>
        </form>

        <hr class="duong-phan-cach" />

        <div class="lien-ket">
            <a href="login.html">← Quay lại đăng nhập</a>
        </div>
    </div>

    <script>
        function kiemTraEmail(email) {
            var re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function kiemTraTenDangNhap(ten) {
            var re = /^[a-zA-Z0-9_]+$/;
            return re.test(ten);
        }

        function dangKy() {
            var hoTen = document.getElementById('hoTen').value.trim();
            var tenDangNhap = document.getElementById('tenDangNhap').value.trim();
            var matKhau = document.getElementById('matKhau').value;
            var xacNhanMK = document.getElementById('xacNhanMatKhau').value;
            var email = document.getElementById('email').value.trim();
            var sdt = document.getElementById('sdt').value.trim();
            var hienThiLoi = document.getElementById('thongBaoLoi');

            hienThiLoi.style.display = 'none';

            if (!hoTen || !tenDangNhap || !matKhau || !xacNhanMK || !email || !sdt) {
                hienThiLoi.style.display = 'block';
                hienThiLoi.textContent = '⚠ Vui lòng điền đầy đủ tất cả các trường bắt buộc (*)!';
                return;
            }

            if (!kiemTraTenDangNhap(tenDangNhap)) {
                hienThiLoi.style.display = 'block';
                hienThiLoi.textContent = '⚠ Tên đăng nhập chỉ được dùng chữ cái, chữ số và dấu gạch dưới (_)!';
                return;
            }

            if (tenDangNhap.length < 4) {
                hienThiLoi.style.display = 'block';
                hienThiLoi.textContent = '⚠ Tên đăng nhập phải có ít nhất 4 ký tự!';
                return;
            }

            if (matKhau.length < 6) {
                hienThiLoi.style.display = 'block';
                hienThiLoi.textContent = '⚠ Mật khẩu phải có ít nhất 6 ký tự!';
                return;
            }

            if (matKhau !== xacNhanMK) {
                hienThiLoi.style.display = 'block';
                hienThiLoi.textContent = '⚠ Mật khẩu xác nhận không khớp!';
                document.getElementById('xacNhanMatKhau').value = '';
                return;
            }

            if (!kiemTraEmail(email)) {
                hienThiLoi.style.display = 'block';
                hienThiLoi.textContent = '⚠ Email không hợp lệ!';
                return;
            }

            if (!/^[0-9]{9,11}$/.test(sdt)) {
                hienThiLoi.style.display = 'block';
                hienThiLoi.textContent = '⚠ Số điện thoại không hợp lệ!';
                return;
            }

            var users = JSON.parse(localStorage.getItem('users') || '[]');

            for (var i = 0; i < users.length; i++) {
                if (users[i].username === tenDangNhap) {
                    hienThiLoi.style.display = 'block';
                    hienThiLoi.textContent = '⚠ Tên đăng nhập "' + tenDangNhap + '" đã tồn tại!';
                    return;
                }
            }

            var taiKhoanMoi = {
                username: tenDangNhap,
                password: matKhau,
                role: 'user',
                hoTen: hoTen,
                email: email,
                sdt: sdt
            };

            users.push(taiKhoanMoi);
            localStorage.setItem('users', JSON.stringify(users));

            alert('Đăng ký thành công!\nTên đăng nhập: ' + tenDangNhap);
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
