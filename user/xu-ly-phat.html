.filter-bar { overflow: hidden; margin-bottom: 5px; }
.filter-bar label { float: left; line-height: 36px; font-weight: bold; color: #555; margin-right: 10px; font-size: 13px; }
.filter-bar select { float: left; padding: 7px 11px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; width: 200px; margin-right: 10px; }
.filter-bar select:focus { outline: none; border-color: #2196F3; }
.btn { padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }

.btn-primary:hover { background: #1976D2; }
.btn-success { background: #4CAF50; color: white; font-size: 12px; padding: 5px 12px; }
.btn-success:hover { background: #388E3C; }
table { width: 100%; border-collapse: collapse; margin-top: 5px; }
th { background: #2196F3; color: white; padding: 10px 12px; text-align: left; font-size: 13px; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 1px solid #eee; font-size: 13px; vertical-align: middle; }
tr:hover td { background: #F5F5F5; }
.tbl-empty { text-align: center; color: #888; padding: 30px; font-style: italic; }
.badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 12px; font-weight: bold; white-space: nowrap; }
.badge-chua { background: #FFEBEE; color: #C62828; border: 1px solid #FFCDD2; }
.badge-da { background: #E8F5E9; color: #2E7D32; border: 1px solid #C8E6C9; }
.loai-vp { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.vp-qua-han { background: #FFF9C4; color: #827717; }
.vp-hu-hong { background: #FBE9E7; color: #BF360C; }
.vp-mat-sach { background: #FCE4EC; color: #880E4F; }
.tien { font-weight: bold; color: #C62828; }
.tong-ket { overflow: hidden; padding: 15px 0; border-top: 2px solid #E3F2FD; margin-top: 15px; }
.tong-ket-item { float: left; width: 50%; padding: 12px 16px; border-radius: 4px; margin-bottom: 0; }
.tong-chua { background: #FFEBEE; border: 1px solid #FFCDD2; margin-right: 10px; width: calc(50% - 10px); }
.tong-da { background: #E8F5E9; border: 1px solid #C8E6C9; }
.tong-ket-item .so-tien { font-size: 20px; font-weight: bold; margin-top: 4px; }
.tong-chua .so-tien { color: #C62828; }
.tong-da .so-tien { color: #2E7D32; }
.tong-ket-item .nhan { font-size: 12px; color: #666; }
.note { font-size: 12px; color: #888; margin-top: 8px; }
.empty-state { text-align: center; padding: 40px 20px; color: #999; font-style: italic; font-size: 15px; }

<div class="content">
    <div class="page-title"><h2>💰 Xử lý phạt</h2></div>

    <div class="card">
        <h3>🔍 Bộ lọc</h3>
        <div class="filter-bar">
            <label for="locTrangThai">Trạng thái:</label>
            <select id="locTrangThai">
                <option value="Tất cả">Tất cả</option>
                <option value="Chưa thanh toán">Chưa thanh toán</option>
                <option value="Đã thanh toán">Đã thanh toán</option>
            </select>
            <button class="btn btn-primary" onclick="locVaHienThi()">🔍 Lọc</button>
        </div>
    </div>

    <div class="card">
        <h3>📋 Danh sách phiếu phạt</h3>
        <div id="bangPhat"></div>
        <div class="tong-ket" id="tongKet"></div>
    </div>
</div>

<script>
window.onload = function() {
    var user = localStorage.getItem('currentUser') || 'Nhân viên';
    var userInfo = JSON.parse(localStorage.getItem('currentUserInfo') || '{}');
    var tenHienThi = userInfo.hoTen || user;
    document.getElementById('tenNguoiDung').textContent = tenHienThi;
};

function dinhDangTien(so) {
    so = Math.round(parseFloat(so) || 0);
    if (so === 0) return '0 đ';
    var str = so.toString();
    var result = '';
    for (var i = 0; i < str.length; i++) {
        if (i > 0 && (str.length - i) % 3 === 0) result += '.';
        result += str[i];
    }
    return result + ' đ';
}

function dinhDangNgay(str) {
    if (!str) return '---';
    var p = str.split('-');
    if (p.length === 3) return p[2] + '/' + p[1] + '/' + p[0];
    return str;
}

function layClassLoaiVP(loaiVP) {
    if (loaiVP === 'Quá hạn') return 'loai-vp vp-qua-han';
    if (loaiVP === 'Hư hỏng') return 'loai-vp vp-hu-hong';
    if (loaiVP === 'Mất sách') return 'loai-vp vp-mat-sach';
    return 'loai-vp vp-qua-han';
}

function locVaHienThi() {
    var locGiaTri = document.getElementById('locTrangThai').value;
    var dsPhat = JSON.parse(localStorage.getItem('danhSachPhat') || '[]');
    var dsLoc = [];
    for (var i = 0; i < dsPhat.length; i++) {
        if (locGiaTri === 'Tất cả' || dsPhat[i].trangThai === locGiaTri) {
            dsLoc.push(dsPhat[i]);
        }
    }
    dsLoc.sort(function(a, b) {
        if (a.trangThai === 'Chưa thanh toán' && b.trangThai !== 'Chưa thanh toán') return -1;
        if (a.trangThai !== 'Chưa thanh toán' && b.trangThai === 'Chưa thanh toán') return 1;
        if (a.ngayPhat > b.ngayPhat) return -1;
        if (a.ngayPhat < b.ngayPhat) return 1;
        return 0;
    });
    hienThiBang(dsLoc);
    hienThiTongKet(dsPhat);
}

function hienThiBang(danhSach) {
    var container = document.getElementById('bangPhat');
    if (danhSach.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 Không có phiếu phạt nào phù hợp với điều kiện lọc.</div>';
        return;
    }

    var html = '<table><tr><th style="width:40px;">STT</th><th>Mã phạt</th><th>Mã DG</th><th>Tên độc giả</th><th>Loại vi phạm</th><th style="text-align:right;">Số tiền</th><th>Ngày phạt</th><th>Trạng thái</th><th style="text-align:center;">Hành động</th></tr>';

    for (var i = 0; i < danhSach.length; i++) {
        var p = danhSach[i];
        var chuaTT = p.trangThai === 'Chưa thanh toán';
        var nutHanhDong = '';
        if (chuaTT) {
            nutHanhDong = '<button class="btn btn-success" onclick="thanhToan(\'' + escapeStr(p.maPhat) + '\')">💳 Thanh toán</button>';
        } else {
            nutHanhDong = '<span style="color:#888;font-size:12px;">✓ Đã xong</span>';
        }

        html += '<tr><td>' + (i + 1) + '</td><td style="font-size:12px;font-family:monospace;">' + p.maPhat + '</td><td>' + p.maDG + '</td><td>' + p.tenDG + '</td>';
        html += '<td><span class="' + layClassLoaiVP(p.loaiVP) + '">' + p.loaiVP + '</span></td><td style="text-align:right;" class="tien">' + dinhDangTien(p.soTien) + '</td>';
        html += '<td>' + dinhDangNgay(p.ngayPhat) + '</td><td><span class="badge ' + (chuaTT ? 'badge-chua' : 'badge-da') + '">' + p.trangThai + '</span></td>';
        html += '<td style="text-align:center;">' + nutHanhDong + '</td></tr>';
    }
    html += '</table><p class="note">Tổng: <strong>' + danhSach.length + '</strong> phiếu phạt</p>';
    container.innerHTML = html;
}

function escapeStr(str) {
    return String(str).replace(/'/g, "\\'");
}

function hienThiTongKet(danhSachTatCa) {
    var tongChuaTT = 0, demChuaTT = 0, tongDaTT = 0, demDaTT = 0;
    for (var i = 0; i < danhSachTatCa.length; i++) {
        var soTien = parseFloat(danhSachTatCa[i].soTien) || 0;
        if (danhSachTatCa[i].trangThai === 'Chưa thanh toán') {
            tongChuaTT += soTien;
            demChuaTT++;
        } else {
            tongDaTT += soTien;
            demDaTT++;
        }
    }
    document.getElementById('tongKet').innerHTML = '<div class="tong-ket-item tong-chua"><div class="nhan">💳 CHƯA THANH TOÁN (' + demChuaTT + ' phiếu)</div><div class="so-tien">' + dinhDangTien(tongChuaTT) + '</div></div>'
        + '<div class="tong-ket-item tong-da"><div class="nhan">✅ ĐÃ THANH TOÁN (' + demDaTT + ' phiếu)</div><div class="so-tien">' + dinhDangTien(tongDaTT) + '</div></div>';
}

function thanhToan(maPhat) {
    var dsPhat = JSON.parse(localStorage.getItem('danhSachPhat') || '[]');
    var viTri = -1, phieuPhat = null;
    for (var i = 0; i < dsPhat.length; i++) {
        if (dsPhat[i].maPhat === maPhat) {
            phieuPhat = dsPhat[i];
            viTri = i;
            break;
        }
    }
    if (!phieuPhat) {
        alert('Lỗi: Không tìm thấy phiếu phạt!');
        return;
    }
    if (phieuPhat.trangThai === 'Đã thanh toán') {
        alert('Phiếu phạt này đã được thanh toán rồi!');
        return;
    }

    var soTienPhat = parseFloat(phieuPhat.soTien) || 0;
    var thongTinPhat = 'THANH TOÁN PHIẾU PHẠT\n\nMã phạt: ' + phieuPhat.maPhat + '\nĐộc giả: ' + phieuPhat.tenDG + ' (' + phieuPhat.maDG + ')\nLoại vi phạm: ' + phieuPhat.loaiVP + '\nNgày phạt: ' + dinhDangNgay(phieuPhat.ngayPhat) + '\n─────────────────────\nSố tiền phạt: ' + dinhDangTien(soTienPhat) + '\n\nNhập số tiền khách đưa:';
    var nhapStr = prompt(thongTinPhat);
    if (nhapStr === null) return;

    var soTienNhan = parseFloat(nhapStr.replace(/[,\s\.]/g, ''));
    if (isNaN(soTienNhan) || nhapStr.trim() === '') {
        alert('⚠️ Số tiền không hợp lệ! Vui lòng nhập số.');
        return;
    }
    if (soTienNhan < 0) {
        alert('⚠️ Số tiền không được âm!');
        return;
    }
    if (soTienNhan < soTienPhat) {
        alert('⚠️ Số tiền đưa (' + dinhDangTien(soTienNhan) + ') không đủ so với số tiền phạt (' + dinhDangTien(soTienPhat) + ')!');
        return;
    }

    var tienThua = soTienNhan - soTienPhat;
    dsPhat[viTri].trangThai = 'Đã thanh toán';
    dsPhat[viTri].ngayThanhToan = layNgayHomNay();
    dsPhat[viTri].soTienNhan = soTienNhan;
    localStorage.setItem('danhSachPhat', JSON.stringify(dsPhat));

    alert('✅ ĐÃ THANH TOÁN THÀNH CÔNG!\n\nPhiếu phạt: ' + phieuPhat.maPhat + '\nSố tiền phạt: ' + dinhDangTien(soTienPhat) + '\nSố tiền nhận: ' + dinhDangTien(soTienNhan) + '\n─────────────────────\nTiền thừa trả lại: ' + dinhDangTien(tienThua));
    locVaHienThi();
}

function layNgayHomNay() {
    var d = new Date();
    var thang = String(d.getMonth() + 1).padStart(2, '0');
    var ngay = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + thang + '-' + ngay;
}
</script>
