<style>
/* ========== RESET ========== */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; font-size: 14px; }

/* ========== HEADER ========== */
.header {
    background: #2196F3; color: white;
    padding: 0 20px; height: 55px; line-height: 55px;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100; overflow: hidden;
}
.header h1 { float: left; font-size: 20px; }
.header .user-info { float: right; font-size: 13px; }
.header .user-info a { color: #fff; text-decoration: none; }

/* ========== SIDEBAR ========== */
.sidebar {
    float: left; width: 200px; background: #1565C0;
    min-height: 100vh; padding-top: 55px;
    position: fixed; top: 0; left: 0;
}
.sidebar a {
    display: block; color: #fff; text-decoration: none;
    padding: 10px 15px; font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar a:hover { background: #1976D2; }
.sidebar a.active { background: #2196F3; font-weight: bold; }

/* ========== NỘI DUNG ========== */
.content { margin-left: 220px; padding: 70px 20px 30px 20px; }

.page-title {
    background: white; padding: 14px 20px; margin-bottom: 18px;
    border-radius: 4px; border-left: 4px solid #2196F3;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.page-title h2 { font-size: 17px; color: #333; }

.card {
    background: white; padding: 20px; margin-bottom: 18px;
    border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.card h3 {
    font-size: 15px; color: #2196F3; margin-bottom: 15px;
    padding-bottom: 8px; border-bottom: 2px solid #E3F2FD;
}

/* Form lọc */
.filter-bar { overflow: hidden; margin-bottom: 5px; }
.filter-bar label {
    float: left; line-height: 36px;
    font-weight: bold; color: #555; margin-right: 10px;
    font-size: 13px;
}
.filter-bar select {
    float: left; padding: 7px 11px; border: 1px solid #ccc;
    border-radius: 4px; font-size: 14px; width: 200px;
    margin-right: 10px;
}
.filter-bar select:focus { outline: none; border-color: #2196F3; }

/* Nút */
.btn { padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
.btn-primary { background: #2196F3; color: white; }
.btn-primary:hover { background: #1976D2; }
.btn-success { background: #4CAF50; color: white; font-size: 12px; padding: 5px 12px; }
.btn-success:hover { background: #388E3C; }

/* Bảng */
table { width: 100%; border-collapse: collapse; margin-top: 5px; }
th {
    background: #2196F3; color: white;
    padding: 10px 12px; text-align: left; font-size: 13px;
    white-space: nowrap;
}
td {
    padding: 9px 12px; border-bottom: 1px solid #eee;
    font-size: 13px; vertical-align: middle;
}
tr:hover td { background: #F5F5F5; }
.tbl-empty { text-align: center; color: #888; padding: 30px; font-style: italic; }

/* Nhãn trạng thái */
.badge {
    display: inline-block; padding: 3px 9px;
    border-radius: 12px; font-size: 12px; font-weight: bold;
    white-space: nowrap;
}
.badge-chua { background: #FFEBEE; color: #C62828; border: 1px solid #FFCDD2; }
.badge-da { background: #E8F5E9; color: #2E7D32; border: 1px solid #C8E6C9; }

/* Nhãn loại vi phạm */
.loai-vp {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 12px;
}
.vp-qua-han { background: #FFF9C4; color: #827717; }
.vp-hu-hong { background: #FBE9E7; color: #BF360C; }
.vp-mat-sach { background: #FCE4EC; color: #880E4F; }

/* Tiền tệ */
.tien { font-weight: bold; color: #C62828; }

/* Tổng kết */
.tong-ket {
    overflow: hidden; padding: 15px 0; border-top: 2px solid #E3F2FD; margin-top: 15px;
}
.tong-ket-item {
    float: left; width: 50%; padding: 12px 16px;
    border-radius: 4px; margin-bottom: 0;
}
.tong-chua {
    background: #FFEBEE; border: 1px solid #FFCDD2;
    margin-right: 10px; width: calc(50% - 10px);
}
.tong-da {
    background: #E8F5E9; border: 1px solid #C8E6C9;
}
.tong-ket-item .so-tien {
    font-size: 20px; font-weight: bold; margin-top: 4px;
}
.tong-chua .so-tien { color: #C62828; }
.tong-da .so-tien { color: #2E7D32; }
.tong-ket-item .nhan { font-size: 12px; color: #666; }

/* Ghi chú */
.note { font-size: 12px; color: #888; margin-top: 8px; }

/* Trống */
.empty-state {
    text-align: center; padding: 40px 20px;
    color: #999; font-style: italic; font-size: 15px;
}
</style>
</head>
<body>

<!-- ========== NỘI DUNG CHÍNH ========== -->
<div class="content">

    <div class="page-title">
        <h2>💰 Xử lý phạt</h2>
    </div>

    <!-- ===== BỘ LỌC ===== -->
    <div class="card">
        <h3>🔍 Bộ lọc</h3>
        <div class="filter-bar">
            <label for="locTrangThai">Trạng thái:</label>
            <select id="locTrangThai">
                <option value="Tất cả">Tất cả</option>
                <option value="Chưa thanh toán">Chưa thanh toán</option>
                <option value="Đã thanh toán">Đã thanh toán</option>
            </select>
            <button class="btn btn-primary" onclick="locVaHienThi()">🔍 Lọc</button>
        </div>
    </div>

    <!-- ===== BẢNG DANH SÁCH PHẠT ===== -->
    <div class="card">
        <h3>📋 Danh sách phiếu phạt</h3>
        <!-- Bảng được tạo động -->
        <div id="bangPhat"></div>

        <!-- Tổng kết -->
        <div class="tong-ket" id="tongKet"></div>
    </div>

</div><!-- end content -->

<script>
// =====================================================
// KHỞI TẠO TRANG
// =====================================================
window.onload = function() {
    // Hiển thị tên người dùng
    var user = localStorage.getItem('currentUser') || 'Nhân viên';
    document.getElementById('tenNguoiDung').textContent = user;

    // Hiển thị toàn bộ danh sách phạt khi tải trang
    locVaHienThi();
};

// =====================================================
// HÀM TIỆN ÍCH
// =====================================================

// Định dạng tiền Việt Nam
function dinhDangTien(so) {
    so = Math.round(parseFloat(so) || 0);
    if (so === 0) return '0 đ';
    var str = so.toString();
    var result = '';
    for (var i = 0; i < str.length; i++) {
        if (i > 0 && (str.length - i) % 3 === 0) result += '.';
        result += str[i];
    }
    return result + ' đ';
}

// Định dạng ngày DD/MM/YYYY
function dinhDangNgay(str) {
    if (!str) return '---';
    var p = str.split('-');
    if (p.length !== 3) return str;
    return p[2] + '/' + p[1] + '/' + p[0];
}

// Lấy class CSS cho nhãn loại vi phạm
function layClassLoaiVP(loaiVP) {
    if (loaiVP === 'Quá hạn') return 'loai-vp vp-qua-han';
    if (loaiVP === 'Hư hỏng') return 'loai-vp vp-hu-hong';
    if (loaiVP === 'Mất sách') return 'loai-vp vp-mat-sach';
    return 'loai-vp vp-qua-han';
}

// =====================================================
// LỌC VÀ HIỂN THỊ DANH SÁCH PHẠT
// =====================================================
function locVaHienThi() {
    var locGiaTri = document.getElementById('locTrangThai').value;

    // Lấy danh sách phạt từ localStorage
    var dsPhat = JSON.parse(localStorage.getItem('danhSachPhat') || '[]');

    // Lọc theo trạng thái
    var dsLoc = [];
    for (var i = 0; i < dsPhat.length; i++) {
        if (locGiaTri === 'Tất cả' || dsPhat[i].trangThai === locGiaTri) {
            dsLoc.push(dsPhat[i]);
        }
    }

    // Sắp xếp: chưa thanh toán lên trên, mới nhất trên cùng
    dsLoc.sort(function(a, b) {
        if (a.trangThai === 'Chưa thanh toán' && b.trangThai !== 'Chưa thanh toán') return -1;
        if (a.trangThai !== 'Chưa thanh toán' && b.trangThai === 'Chưa thanh toán') return 1;
        // Cùng trạng thái thì sắp xếp theo ngày giảm dần
        if (a.ngayPhat > b.ngayPhat) return -1;
        if (a.ngayPhat < b.ngayPhat) return 1;
        return 0;
    });

    // Vẽ bảng
    hienThiBang(dsLoc);

    // Tính và hiển thị tổng kết (dùng toàn bộ dsPhat, không lọc)
    hienThiTongKet(dsPhat);
}

// =====================================================
// VẼ BẢNG DANH SÁCH PHẠT
// =====================================================
function hienThiBang(danhSach) {
    var container = document.getElementById('bangPhat');

    // Trường hợp không có dữ liệu
    if (danhSach.length === 0) {
        container.innerHTML = '<div class="empty-state">'
            + '📭 Không có phiếu phạt nào phù hợp với điều kiện lọc.'
            + '</div>';
        return;
    }

    var html = '<table>'
        + '<tr>'
        + '<th style="width:40px;">STT</th>'
        + '<th>Mã phạt</th>'
        + '<th>Mã DG</th>'
        + '<th>Tên độc giả</th>'
        + '<th>Loại vi phạm</th>'
        + '<th style="text-align:right;">Số tiền</th>'
        + '<th>Ngày phạt</th>'
        + '<th>Trạng thái</th>'
        + '<th style="text-align:center;">Hành động</th>'
        + '</tr>';

    for (var i = 0; i < danhSach.length; i++) {
        var p = danhSach[i];
        var chuaTT = p.trangThai === 'Chưa thanh toán';

        // Tạo HTML nút hành động
        var nutHanhDong = '';
        if (chuaTT) {
            // Truyền index thực trong mảng bằng maPhat để tìm lại
            nutHanhDong = '<button class="btn btn-success" '
                + 'onclick="thanhToan(\'' + escapeStr(p.maPhat) + '\')">'
                + '💳 Thanh toán</button>';
        } else {
            nutHanhDong = '<span style="color:#888;font-size:12px;">✓ Đã xong</span>';
        }

        html += '<tr>'
            + '<td>' + (i + 1) + '</td>'
            + '<td style="font-size:12px;font-family:monospace;">' + p.maPhat + '</td>'
            + '<td>' + p.maDG + '</td>'
            + '<td>' + p.tenDG + '</td>'
            + '<td><span class="' + layClassLoaiVP(p.loaiVP) + '">' + p.loaiVP + '</span></td>'
            + '<td style="text-align:right;" class="tien">' + dinhDangTien(p.soTien) + '</td>'
            + '<td>' + dinhDangNgay(p.ngayPhat) + '</td>'
            + '<td><span class="badge ' + (chuaTT ? 'badge-chua' : 'badge-da') + '">'
            + p.trangThai + '</span></td>'
            + '<td style="text-align:center;">' + nutHanhDong + '</td>'
            + '</tr>';
    }

    html += '</table>'
        + '<p class="note">Tổng: <strong>' + danhSach.length + '</strong> phiếu phạt</p>';

    container.innerHTML = html;
}

// Escape chuỗi để an toàn trong onclick attribute
function escapeStr(str) {
    return String(str).replace(/'/g, "\\'");
}

// =====================================================
// HIỂN THỊ TỔNG KẾT THANH TOÁN
// =====================================================
function hienThiTongKet(danhSachTatCa) {
    var tongChuaTT = 0;
    var demChuaTT = 0;
    var tongDaTT = 0;
    var demDaTT = 0;

    for (var i = 0; i < danhSachTatCa.length; i++) {
        var soTien = parseFloat(danhSachTatCa[i].soTien) || 0;
        if (danhSachTatCa[i].trangThai === 'Chưa thanh toán') {
            tongChuaTT += soTien;
            demChuaTT++;
        } else {
            tongDaTT += soTien;
            demDaTT++;
        }
    }

    document.getElementById('tongKet').innerHTML = ''
        + '<div class="tong-ket-item tong-chua">'
        + '<div class="nhan">💳 CHƯA THANH TOÁN (' + demChuaTT + ' phiếu)</div>'
        + '<div class="so-tien">' + dinhDangTien(tongChuaTT) + '</div>'
        + '</div>'
        + '<div class="tong-ket-item tong-da">'
        + '<div class="nhan">✅ ĐÃ THANH TOÁN (' + demDaTT + ' phiếu)</div>'
        + '<div class="so-tien">' + dinhDangTien(tongDaTT) + '</div>'
        + '</div>';
}

// =====================================================
// XỬ LÝ THANH TOÁN PHIẾU PHẠT
// =====================================================
function thanhToan(maPhat) {
    // Tìm phiếu phạt trong localStorage
    var dsPhat = JSON.parse(localStorage.getItem('danhSachPhat') || '[]');
    var viTri = -1;
    var phieuPhat = null;

    for (var i = 0; i < dsPhat.length; i++) {
        if (dsPhat[i].maPhat === maPhat) {
            phieuPhat = dsPhat[i];
            viTri = i;
            break;
        }
    }

    // Không tìm thấy
    if (!phieuPhat) {
        alert('Lỗi: Không tìm thấy phiếu phạt!');
        return;
    }

    // Kiểm tra đã thanh toán chưa
    if (phieuPhat.trangThai === 'Đã thanh toán') {
        alert('Phiếu phạt này đã được thanh toán rồi!');
        return;
    }

    var soTienPhat = parseFloat(phieuPhat.soTien) || 0;

    // Hiển thị thông tin và yêu cầu nhập số tiền nhận
    var thongTinPhat = 'THANH TOÁN PHIẾU PHẠT\n\n'
        + 'Mã phạt: ' + phieuPhat.maPhat + '\n'
        + 'Độc giả: ' + phieuPhat.tenDG + ' (' + phieuPhat.maDG + ')\n'
        + 'Loại vi phạm: ' + phieuPhat.loaiVP + '\n'
        + 'Ngày phạt: ' + dinhDangNgay(phieuPhat.ngayPhat) + '\n'
        + '─────────────────────\n'
        + 'Số tiền phạt: ' + dinhDangTien(soTienPhat) + '\n\n'
        + 'Nhập số tiền khách đưa:';

    // Dùng prompt() để nhận số tiền từ nhân viên
    var nhapStr = prompt(thongTinPhat);

    // Người dùng bấm Cancel
    if (nhapStr === null) return;

    // Kiểm tra số tiền nhập vào
    var soTienNhan = parseFloat(nhapStr.replace(/[,\s\.]/g, ''));

    if (isNaN(soTienNhan) || nhapStr.trim() === '') {
        alert('⚠️ Số tiền không hợp lệ! Vui lòng nhập số.');
        return;
    }

    if (soTienNhan < 0) {
        alert('⚠️ Số tiền không được âm!');
        return;
    }

    if (soTienNhan < soTienPhat) {
        alert('⚠️ Số tiền đưa (' + dinhDangTien(soTienNhan) + ') '
            + 'không đủ so với số tiền phạt (' + dinhDangTien(soTienPhat) + ')!');
        return;
    }

    // Tính tiền thừa
    var tienThua = soTienNhan - soTienPhat;

    // Cập nhật trạng thái phiếu phạt
    dsPhat[viTri].trangThai = 'Đã thanh toán';
    dsPhat[viTri].ngayThanhToan = layNgayHomNay();
    dsPhat[viTri].soTienNhan = soTienNhan;
    localStorage.setItem('danhSachPhat', JSON.stringify(dsPhat));

    // Thông báo kết quả
    alert('✅ ĐÃ THANH TOÁN THÀNH CÔNG!\n\n'
        + 'Phiếu phạt: ' + phieuPhat.maPhat + '\n'
        + 'Số tiền phạt: ' + dinhDangTien(soTienPhat) + '\n'
        + 'Số tiền nhận: ' + dinhDangTien(soTienNhan) + '\n'
        + '─────────────────────\n'
        + 'Tiền thừa trả lại: ' + dinhDangTien(tienThua));

    // Làm mới bảng theo bộ lọc hiện tại
    locVaHienThi();
}

// Lấy ngày hôm nay định dạng YYYY-MM-DD
function layNgayHomNay() {
    var d = new Date();
    var thang = String(d.getMonth() + 1).padStart(2, '0');
    var ngay = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + thang + '-' + ngay;
}
</script>
