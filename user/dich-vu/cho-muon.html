<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cho Mượn Sách - Thư Viện</title>
  <link rel="stylesheet" href="../../assets/css/user.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    .step-card{background:#fff;border-radius:10px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
    .step-title{font-size:1.1rem;font-weight:700;margin-bottom:16px;color:#2563eb;display:flex;align-items:center;gap:8px;}
    .step-badge{background:#2563eb;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.85rem;}
    .reader-card{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:16px;margin-top:12px;display:none;}
    .reader-card.show{display:block;}
    .reader-info{display:flex;flex-wrap:wrap;gap:12px;}
    .reader-info-item{flex:1 1 160px;}
    .reader-info-item label{font-size:.75rem;color:#64748b;display:block;}
    .reader-info-item span{font-weight:600;}
    .badge{padding:3px 10px;border-radius:999px;font-size:.78rem;font-weight:600;}
    .badge-active{background:#dcfce7;color:#16a34a;}
    .badge-inactive{background:#fee2e2;color:#dc2626;}
    .badge-suspended{background:#fef3c7;color:#d97706;}
    .search-row{display:flex;gap:8px;}
    .search-row input{flex:1;}
    .books-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:.9rem;}
    .books-table th{background:#f1f5f9;padding:8px 12px;text-align:left;font-weight:600;color:#475569;}
    .books-table td{padding:8px 12px;border-bottom:1px solid #f1f5f9;}
    .books-table tr:hover td{background:#f8fafc;}
    .form-row{display:flex;gap:16px;flex-wrap:wrap;}
    .form-group{flex:1 1 200px;}
    .form-group label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:#374151;}
    .form-group input,.form-group textarea,.form-group select{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:.9rem;}
    .error-msg{color:#dc2626;background:#fee2e2;padding:10px 14px;border-radius:6px;margin-top:10px;display:none;}
    .error-msg.show{display:block;}
    .book-search-results{margin-top:10px;}
    .book-result-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:6px;background:#fff;}
    .book-result-item:hover{background:#f8fafc;}
    .print-option{display:flex;align-items:center;gap:8px;margin-top:12px;}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><i class="fas fa-book-open"></i><span>Thư Viện</span></div>
      <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">TỔNG QUAN</div>
        <a href="../dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">QUẢN LÝ</div>
        <a href="../doc-gia/danh-sach.html" class="nav-item"><i class="fas fa-users"></i><span>Độc giả</span></a>
        <a href="../sach/danh-sach.html" class="nav-item"><i class="fas fa-book"></i><span>Sách</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">DỊCH VỤ</div>
        <a href="../dich-vu/cho-muon.html" class="nav-item active"><i class="fas fa-hand-holding-heart"></i><span>Cho mượn</span></a>
        <a href="../dich-vu/tra-sach.html" class="nav-item"><i class="fas fa-undo-alt"></i><span>Trả sách</span></a>
        <a href="../dich-vu/gia-han.html" class="nav-item"><i class="fas fa-calendar-plus"></i><span>Gia hạn</span></a>
        <a href="../dich-vu/xu-ly-phat.html" class="nav-item"><i class="fas fa-gavel"></i><span>Xử lý phạt</span></a>
        <a href="../dich-vu/dat-cho.html" class="nav-item"><i class="fas fa-bookmark"></i><span>Đặt chỗ</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">BÁO CÁO</div>
        <a href="../bao-cao/lich-su.html" class="nav-item"><i class="fas fa-history"></i><span>Lịch sử</span></a>
        <a href="../bao-cao/thong-ke.html" class="nav-item"><i class="fas fa-chart-bar"></i><span>Thống kê</span></a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i><span>Đăng xuất</span></button>
    </div>
  </aside>
  <div class="main-content">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
      <div class="topbar-title"><i class="fas fa-hand-holding-heart"></i> Cho Mượn Sách</div>
      <div class="topbar-right" id="userInfo"></div>
    </header>
    <div class="content-area">

      <!-- Step 1: Tìm độc giả -->
      <div class="step-card">
        <div class="step-title"><span class="step-badge">1</span> Tìm Độc Giả</div>
        <div class="search-row">
          <input type="text" id="readerSearch" placeholder="Nhập mã độc giả hoặc họ tên..." />
          <button class="btn btn-primary" onclick="searchReader()"><i class="fas fa-search"></i> Tìm kiếm</button>
        </div>
        <div class="error-msg" id="readerError"></div>
        <div class="reader-card" id="readerCard">
          <div class="reader-info">
            <div class="reader-info-item"><label>Họ tên</label><span id="rc-hoTen"></span></div>
            <div class="reader-info-item"><label>Mã độc giả</label><span id="rc-maDG"></span></div>
            <div class="reader-info-item"><label>Lớp</label><span id="rc-lop"></span></div>
            <div class="reader-info-item"><label>Trạng thái</label><span id="rc-trangThai"></span></div>
            <div class="reader-info-item"><label>Sách đang mượn</label><span id="rc-soSach"></span></div>
          </div>
        </div>
      </div>

      <!-- Step 2: Chọn sách -->
      <div class="step-card">
        <div class="step-title"><span class="step-badge">2</span> Chọn Sách</div>
        <div class="search-row">
          <input type="text" id="bookSearch" placeholder="Nhập mã sách hoặc tên sách..." />
          <button class="btn btn-primary" onclick="searchBook()"><i class="fas fa-search"></i> Tìm sách</button>
        </div>
        <div class="book-search-results" id="bookSearchResults"></div>
        <div style="margin-top:16px;">
          <div style="font-weight:600;margin-bottom:8px;color:#374151;"><i class="fas fa-list"></i> Sách đã chọn (<span id="selectedCount">0</span>/5)</div>
          <table class="books-table" id="selectedBooksTable">
            <thead><tr><th>STT</th><th>Mã sách</th><th>Tên sách</th><th>Số lượng còn</th><th>Xóa</th></tr></thead>
            <tbody id="selectedBooksBody"><tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:20px;">Chưa có sách nào được chọn</td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- Step 3: Thông tin phiếu -->
      <div class="step-card">
        <div class="step-title"><span class="step-badge">3</span> Thông Tin Phiếu Mượn</div>
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-calendar"></i> Ngày mượn</label>
            <input type="date" id="ngayMuon" readonly />
          </div>
          <div class="form-group">
            <label><i class="fas fa-calendar-check"></i> Hạn trả</label>
            <input type="date" id="hanTra" />
          </div>
        </div>
        <div class="form-group" style="margin-top:12px;">
          <label><i class="fas fa-sticky-note"></i> Ghi chú</label>
          <textarea id="ghiChu" rows="3" placeholder="Ghi chú thêm (nếu có)..."></textarea>
        </div>
        <div class="print-option">
          <input type="checkbox" id="printSlip" />
          <label for="printSlip">In phiếu mượn sau khi tạo</label>
        </div>
        <div style="margin-top:16px;">
          <button class="btn btn-success" id="submitBtn" onclick="taoPhieuMuon()" disabled>
            <i class="fas fa-plus-circle"></i> Tạo phiếu mượn
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../../assets/js/storage.js"></script>
<script src="../../assets/js/main.js"></script>
<script src="../../assets/js/user.js"></script>
<script>
checkAuth('user');

let selectedReader = null;
let selectedBooks = [];
const MAX_BOOKS = 5;
const MAX_READER_BOOKS = 3;

// Init dates
const today = new Date();
const todayStr = today.toISOString().split('T')[0];
document.getElementById('ngayMuon').value = todayStr;
const defaultDue = new Date(today); defaultDue.setDate(defaultDue.getDate() + 14);
document.getElementById('hanTra').value = defaultDue.toISOString().split('T')[0];

// Pre-fill from URL
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('maDG')) {
  document.getElementById('readerSearch').value = urlParams.get('maDG');
  searchReader();
}
if (urlParams.get('maSach')) {
  document.getElementById('bookSearch').value = urlParams.get('maSach');
  searchBook();
}

function searchReader() {
  const q = document.getElementById('readerSearch').value.trim().toLowerCase();
  const errEl = document.getElementById('readerError');
  const cardEl = document.getElementById('readerCard');
  errEl.className = 'error-msg'; errEl.textContent = '';
  cardEl.className = 'reader-card';
  if (!q) return;
  const readers = storage.getAll('docGia');
  const found = readers.find(r => r.maDG.toLowerCase() === q || r.hoTen.toLowerCase().includes(q));
  if (!found) { errEl.textContent = 'Không tìm thấy độc giả.'; errEl.className = 'error-msg show'; selectedReader = null; updateSubmitBtn(); return; }
  if (found.trangThai === 'ngungHoatDong' || found.trangThai === 'dinh_chi') {
    errEl.textContent = 'Độc giả đang bị đình chỉ hoặc ngừng hoạt động, không thể mượn sách.'; errEl.className = 'error-msg show'; selectedReader = null; updateSubmitBtn(); return;
  }
  const soSach = found.soSachDangMuon || 0;
  if (soSach >= MAX_READER_BOOKS) {
    errEl.textContent = `Độc giả đang mượn ${soSach}/${MAX_READER_BOOKS} sách, đã đạt giới hạn.`; errEl.className = 'error-msg show'; selectedReader = null; updateSubmitBtn(); return;
  }
  selectedReader = found;
  document.getElementById('rc-hoTen').textContent = found.hoTen;
  document.getElementById('rc-maDG').textContent = found.maDG;
  document.getElementById('rc-lop').textContent = found.lop || '-';
  const statusMap = {hoatDong:'badge-active', ngungHoatDong:'badge-inactive', dinh_chi:'badge-suspended'};
  const labelMap = {hoatDong:'Hoạt động', ngungHoatDong:'Ngừng HĐ', dinh_chi:'Đình chỉ'};
  document.getElementById('rc-trangThai').innerHTML = `<span class="badge ${statusMap[found.trangThai]||'badge-inactive'}">${labelMap[found.trangThai]||found.trangThai}</span>`;
  document.getElementById('rc-soSach').textContent = `${soSach}/${MAX_READER_BOOKS}`;
  cardEl.className = 'reader-card show';
  updateSubmitBtn();
}

function searchBook() {
  const q = document.getElementById('bookSearch').value.trim().toLowerCase();
  const resultsEl = document.getElementById('bookSearchResults');
  resultsEl.innerHTML = '';
  if (!q) return;
  const books = storage.getAll('sach');
  const found = books.filter(b => (b.maSach.toLowerCase().includes(q) || b.tenSach.toLowerCase().includes(q)) && (b.soLuongCon || 0) > 0);
  if (!found.length) { resultsEl.innerHTML = '<p style="color:#9ca3af;margin-top:8px;">Không tìm thấy sách hoặc sách không còn trong kho.</p>'; return; }
  found.forEach(b => {
    const already = selectedBooks.find(s => s.maSach === b.maSach);
    const div = document.createElement('div');
    div.className = 'book-result-item';
    div.innerHTML = `<div><strong>${b.maSach}</strong> - ${b.tenSach} <span style="color:#64748b;font-size:.85rem;">(Còn: ${b.soLuongCon})</span></div>
      <button class="btn btn-sm btn-primary" ${already?'disabled':''} onclick="addBook('${b.maSach}')"><i class="fas fa-plus"></i> ${already?'Đã thêm':'Thêm vào danh sách'}</button>`;
    resultsEl.appendChild(div);
  });
}

function addBook(maSach) {
  if (selectedBooks.length >= MAX_BOOKS) { showAlert(`Chỉ được chọn tối đa ${MAX_BOOKS} sách.`, 'warning'); return; }
  if (selectedBooks.find(b => b.maSach === maSach)) return;
  const books = storage.getAll('sach');
  const book = books.find(b => b.maSach === maSach);
  if (!book) return;
  selectedBooks.push(book);
  renderSelectedBooks();
  searchBook();
  updateSubmitBtn();
}

function removeBook(maSach) {
  selectedBooks = selectedBooks.filter(b => b.maSach !== maSach);
  renderSelectedBooks();
  searchBook();
  updateSubmitBtn();
}

function renderSelectedBooks() {
  document.getElementById('selectedCount').textContent = selectedBooks.length;
  const tbody = document.getElementById('selectedBooksBody');
  if (!selectedBooks.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:20px;">Chưa có sách nào được chọn</td></tr>';
    return;
  }
  tbody.innerHTML = selectedBooks.map((b, i) => `<tr>
    <td>${i+1}</td><td>${b.maSach}</td><td>${b.tenSach}</td><td>${b.soLuongCon}</td>
    <td><button class="btn btn-sm btn-danger" onclick="removeBook('${b.maSach}')"><i class="fas fa-trash"></i></button></td>
  </tr>`).join('');
}

function updateSubmitBtn() {
  document.getElementById('submitBtn').disabled = !(selectedReader && selectedBooks.length > 0);
}

function taoPhieuMuon() {
  if (!selectedReader || !selectedBooks.length) return;
  const phieuMuons = storage.getAll('phieuMuon');
  const maPhieu = generateId('PM', phieuMuons, 'maPhieu');
  const hanTra = document.getElementById('hanTra').value;
  const ghiChu = document.getElementById('ghiChu').value;
  const phieu = {
    maPhieu, maDG: selectedReader.maDG, tenDocGia: selectedReader.hoTen,
    ngayMuon: todayStr, hanTra, ghiChu,
    sachMuon: selectedBooks.map(b => ({ maSach: b.maSach, tenSach: b.tenSach, tinhTrang: 'tot' })),
    trangThai: 'dangMuon', soGiaHan: 0
  };
  storage.addItem('phieuMuon', phieu);
  // Decrement soLuongCon
  selectedBooks.forEach(b => {
    const sach = storage.getAll('sach').find(s => s.maSach === b.maSach);
    if (sach) storage.updateItem('sach', sach.id, { soLuongCon: (sach.soLuongCon || 0) - 1 });
  });
  // Increment soSachDangMuon
  const cur = storage.getAll('docGia').find(d => d.maDG === selectedReader.maDG);
  if (cur) storage.updateItem('docGia', cur.id, { soSachDangMuon: (cur.soSachDangMuon || 0) + selectedBooks.length });
  showAlert(`Tạo phiếu mượn ${maPhieu} thành công!`, 'success');
  if (document.getElementById('printSlip').checked) window.print();
  // Reset
  selectedReader = null; selectedBooks = [];
  document.getElementById('readerSearch').value = '';
  document.getElementById('bookSearch').value = '';
  document.getElementById('readerCard').className = 'reader-card';
  document.getElementById('bookSearchResults').innerHTML = '';
  document.getElementById('readerError').className = 'error-msg';
  renderSelectedBooks(); updateSubmitBtn();
}
</script>
</body>
</html>
