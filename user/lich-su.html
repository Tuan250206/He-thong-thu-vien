<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch sử giao dịch - Hệ thống thư viện</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; font-size: 14px; background: #f0f2f5; color: #333; }
  #header { background: #2196F3; color: #fff; padding: 12px 20px; position: fixed; top: 0; left: 0; right: 0; height: 50px; z-index: 100; overflow: hidden; }
  #header h1 { font-size: 20px; display: inline-block; }
  #header .user-info { float: right; font-size: 13px; margin-top: 2px; }
  #header .user-info a { color: #fff; text-decoration: underline; cursor: pointer; margin-left: 10px; }
  #sidebar { position: fixed; top: 50px; left: 0; bottom: 0; width: 200px; background: #1565C0; overflow-y: auto; z-index: 99; }
  #sidebar a { display: block; padding: 10px 15px; color: #cce5ff; text-decoration: none; border-bottom: 1px solid #1976D2; font-size: 13px; }
  #sidebar a:hover { background: #1976D2; color: #fff; }
  #sidebar a.active { background: #2196F3; color: #fff; font-weight: bold; }
  #content { margin-top: 50px; margin-left: 200px; padding: 20px; min-height: calc(100vh - 50px); }
  .page-title { font-size: 22px; font-weight: bold; color: #1565C0; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #2196F3; }
  .filter-box { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 15px 20px; margin-bottom: 16px; overflow: hidden; }
  .filter-box label { float: left; padding-top: 7px; margin-right: 6px; font-weight: bold; color: #555; white-space: nowrap; }
  .filter-box input[type=date], .filter-box select { float: left; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; margin-right: 14px; }
  .filter-box input[type=date] { width: 140px; }
  .filter-box select { width: 160px; }
  .btn-loc { float: left; padding: 7px 16px; background: #2196F3; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin-right: 8px; }
  .btn-loc:hover { background: #1976D2; }
  .btn-xuat { float: left; padding: 7px 16px; background: #FF9800; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .btn-xuat:hover { background: #F57C00; }
  .so-luong { background: #e3f2fd; border-radius: 4px; padding: 6px 12px; margin-bottom: 12px; font-size: 13px; color: #1565C0; }
  .table-wrap { background: #fff; border: 1px solid #ddd; border-radius: 6px; overflow: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead tr { background: #2196F3; color: #fff; }
  thead th { padding: 10px 12px; text-align: left; font-size: 13px; white-space: nowrap; }
  tbody tr:nth-child(even) { background: #f5f5f5; }
  tbody tr:hover { background: #e3f2fd; }
  tbody td { padding: 8px 12px; font-size: 13px; border-bottom: 1px solid #eee; vertical-align: top; }
  .tag { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: bold; white-space: nowrap; }
  .tag-muon { background: #e3f2fd; color: #1565C0; }
  .tag-tra { background: #e8f5e9; color: #2e7d32; }
  .tag-giahan { background: #fff3e0; color: #e65100; }
  .tag-phat { background: #ffebee; color: #c62828; }
  .empty-row td { text-align: center; padding: 30px; color: #999; font-style: italic; }
  .tien { color: #c62828; font-weight: bold; }
  .clearfix::after { content: ""; display: table; clear: both; }
</style>
</head>
<body>
<div id="header">
  <h1>📚 Hệ thống Thư viện</h1>
  <div class="user-info">Xin chào: <strong id="tenNguoiDung">--</strong><a onclick="dangXuat()">Đăng xuất</a></div>
</div>
<div id="sidebar">
  <a href="dashboard.html">🏠 Trang chủ</a>
  <a href="doc-gia-danh-sach.html">👥 DS Độc giả</a>
  <a href="doc-gia-them.html">➕ Thêm độc giả</a>
  <a href="sach-danh-sach.html">📖 DS Sách</a>
  <a href="sach-tim-kiem.html">🔍 Tìm sách</a>
  <a href="cho-muon.html">🤝 Cho mượn</a>
  <a href="tra-sach.html">↩️ Trả sách</a>
  <a href="gia-han.html">⏰ Gia hạn</a>
  <a href="xu-ly-phat.html">💰 Xử lý phạt</a>
  <a href="dat-cho.html">📌 Đặt chỗ</a>
  <a href="lich-su.html" class="active">📋 Lịch sử</a>
  <a href="thong-ke.html">📊 Thống kê</a>
</div>
<div id="content">
  <div class="page-title">📋 Lịch sử giao dịch</div>
  <div class="filter-box clearfix">
    <label>Từ ngày:</label>
    <input type="date" id="tuNgay" />
    <label>Đến ngày:</label>
    <input type="date" id="denNgay" />
    <label>Loại:</label>
    <select id="loaiGD">
      <option value="">Tất cả</option>
      <option value="Mượn">Mượn</option>
      <option value="Trả">Trả</option>
      <option value="Gia hạn">Gia hạn</option>
      <option value="Phạt">Phạt</option>
    </select>
    <button class="btn-loc" onclick="locLichSu()">🔍 Lọc</button>
    <button class="btn-xuat" onclick="xuatDuLieu()">📤 Xuất (copy bảng)</button>
  </div>
  <div class="so-luong" id="soLuongHienThi">Đang tải...</div>
  <div class="table-wrap" id="tableWrap">
    <table id="bangLichSu">
      <thead>
        <tr>
          <th>STT</th>
          <th>Ngày</th>
          <th>Loại</th>
          <th>Mã giao dịch</th>
          <th>Độc giả</th>
          <th>Chi tiết</th>
          <th>Số tiền</th>
        </tr>
      </thead>
      <tbody id="tableLichSu">
        <tr class="empty-row"><td colspan="7">Đang tải dữ liệu...</td></tr>
      </tbody>
    </table>
  </div>
</div>
<script>
// Khởi tạo trang
window.onload = function() {
  var user = localStorage.getItem('currentUser') || 'Admin';
  document.getElementById('tenNguoiDung').innerText = user;

  // Mặc định: từ đầu tháng đến hôm nay
  var hom_nay = new Date();
  var dauThang = new Date(hom_nay.getFullYear(), hom_nay.getMonth(), 1);
  document.getElementById('tuNgay').value = formatISO(dauThang);
  document.getElementById('denNgay').value = formatISO(hom_nay);

  locLichSu();
};

// Định dạng ngày thành YYYY-MM-DD
function formatISO(d) {
  var m = d.getMonth() + 1;
  var day = d.getDate();
  return d.getFullYear() + '-' + (m < 10 ? '0' + m : m) + '-' + (day < 10 ? '0' + day : day);
}

// Định dạng ngày DD/MM/YYYY
function formatNgay(str) {
  if (!str) return '--';
  var p = str.split('-');
  if (p.length === 3) return p[2] + '/' + p[1] + '/' + p[0];
  return str;
}

// Định dạng tiền tệ
function formatTien(so) {
  if (!so && so !== 0) return '--';
  return Number(so).toLocaleString('vi-VN') + ' đ';
}

// Xây dựng danh sách giao dịch từ tất cả nguồn dữ liệu
function xayDungGiaoDich() {
  var dsPhieuMuon = JSON.parse(localStorage.getItem('danhSachPhieuMuon') || '[]');
  var dsPhat = JSON.parse(localStorage.getItem('danhSachPhat') || '[]');
  var tatCa = [];

  // Thêm giao dịch Mượn
  for (var i = 0; i < dsPhieuMuon.length; i++) {
    var pm = dsPhieuMuon[i];
    // Tóm tắt danh sách sách
    var chiTiet = '';
    if (pm.danhSachSach && pm.danhSachSach.length > 0) {
      var tenSach = [];
      for (var j = 0; j < pm.danhSachSach.length; j++) {
        tenSach.push(pm.danhSachSach[j].tenSach || pm.danhSachSach[j].maSach);
      }
      chiTiet = tenSach.join(', ');
    }
    tatCa.push({
      ngay: pm.ngayMuon || '',
      loai: 'Mượn',
      maGD: pm.maPhieu || '--',
      maDG: pm.maDG || '--',
      tenDG: pm.tenDG || '--',
      chiTiet: chiTiet || 'Phiếu mượn',
      soTien: null
    });

    // Thêm giao dịch Trả nếu đã trả
    if (pm.trangThai === 'Đã trả' || pm.trangThai === 'Da tra') {
      tatCa.push({
        ngay: pm.ngayTra || pm.hanTra || '',
        loai: 'Trả',
        maGD: pm.maPhieu || '--',
        maDG: pm.maDG || '--',
        tenDG: pm.tenDG || '--',
        chiTiet: 'Trả sách - ' + (chiTiet || pm.maPhieu),
        soTien: null
      });
    }

    // Thêm giao dịch Gia hạn nếu có
    if (pm.soLanGiaHan && pm.soLanGiaHan > 0) {
      tatCa.push({
        ngay: pm.ngayGiaHan || pm.hanTra || '',
        loai: 'Gia hạn',
        maGD: pm.maPhieu || '--',
        maDG: pm.maDG || '--',
        tenDG: pm.tenDG || '--',
        chiTiet: 'Gia hạn lần ' + pm.soLanGiaHan + ' - hạn mới: ' + formatNgay(pm.hanTra),
        soTien: null
      });
    }
  }

  // Thêm giao dịch Phạt
  for (var k = 0; k < dsPhat.length; k++) {
    var p = dsPhat[k];
    tatCa.push({
      ngay: p.ngayPhat || '',
      loai: 'Phạt',
      maGD: p.maPhat || '--',
      maDG: p.maDG || '--',
      tenDG: p.tenDG || '--',
      chiTiet: (p.loaiVP || 'Vi phạm') + ' - Phiếu: ' + (p.maPhieu || '--'),
      soTien: p.soTien || 0
    });
  }

  // Sắp xếp theo ngày mới nhất
  tatCa.sort(function(a, b) {
    return (b.ngay || '').localeCompare(a.ngay || '');
  });

  return tatCa;
}

// Lọc lịch sử theo điều kiện
function locLichSu() {
  var tuNgay = document.getElementById('tuNgay').value;
  var denNgay = document.getElementById('denNgay').value;
  var loai = document.getElementById('loaiGD').value;

  var tatCa = xayDungGiaoDich();
  var ketQua = [];

  for (var i = 0; i < tatCa.length; i++) {
    var gd = tatCa[i];

    // Lọc theo ngày
    if (tuNgay && gd.ngay && gd.ngay < tuNgay) continue;
    if (denNgay && gd.ngay && gd.ngay > denNgay) continue;

    // Lọc theo loại giao dịch
    if (loai && gd.loai !== loai) continue;

    ketQua.push(gd);
  }

  hienThiBang(ketQua);
}

// Hiển thị bảng lịch sử
function hienThiBang(ds) {
  var tbody = document.getElementById('tableLichSu');
  var soLuongEl = document.getElementById('soLuongHienThi');
  soLuongEl.innerText = 'Hiển thị ' + ds.length + ' giao dịch';

  if (ds.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Không có giao dịch nào trong khoảng thời gian này</td></tr>';
    return;
  }

  var html = '';
  for (var i = 0; i < ds.length; i++) {
    var gd = ds[i];

    // Chọn class tag theo loại
    var tagClass = 'tag-muon';
    if (gd.loai === 'Trả') tagClass = 'tag-tra';
    if (gd.loai === 'Gia hạn') tagClass = 'tag-giahan';
    if (gd.loai === 'Phạt') tagClass = 'tag-phat';

    // Hiển thị số tiền (chỉ cho Phạt)
    var soTienHtml = '--';
    if (gd.soTien !== null && gd.soTien !== undefined) {
      soTienHtml = '<span class="tien">' + formatTien(gd.soTien) + '</span>';
    }

    html += '<tr>';
    html += '<td>' + (i + 1) + '</td>';
    html += '<td>' + formatNgay(gd.ngay) + '</td>';
    html += '<td><span class="tag ' + tagClass + '">' + gd.loai + '</span></td>';
    html += '<td>' + gd.maGD + '</td>';
    html += '<td>' + gd.maDG + '<br><small style="color:#666">' + gd.tenDG + '</small></td>';
    html += '<td style="max-width:250px;">' + gd.chiTiet + '</td>';
    html += '<td>' + soTienHtml + '</td>';
    html += '</tr>';
  }
  tbody.innerHTML = html;
}

// Xuất dữ liệu: chọn toàn bộ bảng để copy
function xuatDuLieu() {
  var bang = document.getElementById('bangLichSu');
  if (window.getSelection && document.createRange) {
    var selection = window.getSelection();
    var range = document.createRange();
    range.selectNodeContents(bang);
    selection.removeAllRanges();
    selection.addRange(range);
    alert('Đã chọn toàn bộ bảng. Hãy dùng Ctrl+C để copy!');
  } else {
    alert('Trình duyệt không hỗ trợ chọn văn bản tự động.');
  }
}

// Đăng xuất
function dangXuat() {
  if (confirm('Bạn có muốn đăng xuất không?')) {
    localStorage.removeItem('currentUser');
    window.location.href = '../index.html';
  }
}
</script>
</body>
</html>
