body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; font-size: 14px; }

.header .user-info { float: right; font-size: 13px; }

/* ========== SIDEBAR ========== */
.sidebar {
    float: left; width: 200px; background: #1565C0;
    min-height: 100vh; padding-top: 55px;

.sidebar a {

    border-bottom: 1px solid rgba(255,255,255,0.08);
}
.sidebar a:hover { background: #1976D2; }

.page-title {
    background: white; padding: 14px 20px; margin-bottom: 18px;

}

.card {
    background: white; padding: 20px; margin-bottom: 18px;
    border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.card h3 {
    font-size: 15px; color: #2196F3; margin-bottom: 15px;
    padding-bottom: 8px; border-bottom: 2px solid #E3F2FD;
}

/* Form */
.form-group { margin-bottom: 14px; }
.form-group label {
    display: block; font-size: 13px;
    font-weight: bold; color: #555; margin-bottom: 5px;
}
.form-group input, .form-group select {
    padding: 8px 11px; border: 1px solid #ccc;
    border-radius: 4px; font-size: 14px; width: 300px;
}
.form-group input:focus, .form-group select:focus {
    outline: none; border-color: #2196F3;
}

/* Nút */
.btn { padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
.btn-primary { background: #2196F3; color: white; }
.btn-primary:hover { background: #1976D2; }
.btn-success { background: #4CAF50; color: white; }
.btn-success:hover { background: #388E3C; }
.btn-gray { background: #757575; color: white; }
.btn-gray:hover { background: #616161; }

/* Hộp thông tin vàng */
.info-box {
    background: #FFFDE7; border: 1px solid #F9A825;
    border-radius: 4px; padding: 12px 16px;
    font-size: 13px; margin-bottom: 15px;
}
.info-box p { margin-bottom: 5px; }
.info-box p:last-child { margin-bottom: 0; }

/* Hộp lỗi */
.error-box {
    background: #FFEBEE; border: 1px solid #FFCDD2;
    color: #C62828; padding: 10px 14px;
    border-radius: 4px; margin-top: 10px; font-size: 13px;
}

/* Hộp xanh thông tin gia hạn */
.gian-han-box {
    background: #E3F2FD; border: 1px solid #90CAF9;
    border-radius: 4px; padding: 15px 18px; margin: 15px 0;
}
.gian-han-box .row-info {
    overflow: hidden; margin-bottom: 10px;
}
.gian-han-box .row-info:last-child { margin-bottom: 0; }
.gian-han-box .label-col {
    float: left; width: 200px; font-weight: bold;
    color: #1565C0; font-size: 13px; line-height: 26px;
}
.gian-han-box .value-col {
    margin-left: 200px; font-size: 14px; line-height: 26px;
}

/* Hộp cảnh báo */
.warn-box {
    background: #FFF3E0; border: 1px solid #FFCC80;
    color: #E65100; padding: 10px 14px;
    border-radius: 4px; margin: 10px 0; font-size: 13px;
}

/* Nhãn số lần gia hạn */
.badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: bold;
}
.badge-ok { background: #C8E6C9; color: #1B5E20; }
.badge-warn { background: #FFF9C4; color: #827717; }
.badge-danger { background: #FFCDD2; color: #B71C1C; }

/* Ngày mới nổi bật */
.ngay-moi {
    color: #1565C0; font-weight: bold; font-size: 15px;
}

/* Ghi chú */
.note { font-size: 12px; color: #888; margin-top: 5px; }

/* Ẩn */
.hidden { display: none; }

<!-- ========== NỘI DUNG CHÍNH ========== -->
<div class="content">

    <div class="page-title">
        <h2>⏰ Gia hạn mượn sách</h2>
    </div>

    <!-- ===== TÌM PHIẾU MƯỢN ===== -->
    <div class="card">
        <h3>🔍 Tìm phiếu mượn</h3>
        <div class="form-group">
            <label for="maPhieuInput">Mã phiếu mượn:</label>
            <input type="text" id="maPhieuInput" placeholder="Nhập mã phiếu (VD: PM17...)..."
                   onkeydown="if(event.keyCode===13) timPhieuGiaHan()">
            <button class="btn btn-primary" onclick="timPhieuGiaHan()" style="margin-left:8px;">🔍 Tìm</button>
        </div>
        <div id="ketQuaTim"></div>
    </div>

    <!-- ===== THÔNG TIN & GIA HẠN (ẩn ban đầu) ===== -->
    <div class="card hidden" id="cardGiaHan">
        <h3>⏰ Thông tin gia hạn</h3>

        <!-- Thông tin phiếu mượn -->
        <div id="thongTinPhieu"></div>

        <!-- Phần gia hạn (ẩn nếu không đủ điều kiện) -->
        <div id="khuGiaHan"></div>

        <!-- Nút thao tác -->
        <div id="khuNutGiaHan" style="margin-top:18px;"></div>
    </div>

</div><!-- end content -->

<script>
// =====================================================
// BIẾN TOÀN CỤC
// =====================================================
var phieuHienTai = null;    // Phiếu mượn đang thao tác

// =====================================================
// KHỞI TẠO TRANG
// =====================================================
window.onload = function() {
    var user = localStorage.getItem('currentUser') || 'Nhân viên';
    document.getElementById('tenNguoiDung').textContent = user;
};

// =====================================================
// HÀM TIỆN ÍCH
// =====================================================

// Lấy ngày hôm nay định dạng YYYY-MM-DD
function layNgayHomNay() {
    var d = new Date();
    var thang = String(d.getMonth() + 1).padStart(2, '0');
    var ngay = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + thang + '-' + ngay;
}

// Tính ngày sau N ngày từ một ngày cho trước (YYYY-MM-DD) → YYYY-MM-DD
function tinhNgaySau(ngayStr, soNgay) {
    var d = new Date(ngayStr + 'T00:00:00');
    d.setDate(d.getDate() + soNgay);
    var thang = String(d.getMonth() + 1).padStart(2, '0');
    var ngay = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + thang + '-' + ngay;
}

// Định dạng hiển thị DD/MM/YYYY
function dinhDangNgay(str) {
    if (!str) return '---';
    var p = str.split('-');
    if (p.length !== 3) return str;
    return p[2] + '/' + p[1] + '/' + p[0];
}

// Tính số ngày giữa 2 ngày YYYY-MM-DD (d2 - d1)
function tinhSoNgay(ngay1Str, ngay2Str) {
    var d1 = new Date(ngay1Str + 'T00:00:00');
    var d2 = new Date(ngay2Str + 'T00:00:00');
    return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
}

// Hiển thị thông báo lỗi
function hienThiLoi(idEl, msg) {
    document.getElementById(idEl).innerHTML =
        '<div class="error-box">⚠️ ' + msg + '</div>';
}

// =====================================================
// TÌM PHIẾU MƯỢN ĐỂ GIA HẠN
// =====================================================
function timPhieuGiaHan() {
    var maPhieu = document.getElementById('maPhieuInput').value.trim();
    var elKetQua = document.getElementById('ketQuaTim');
    elKetQua.innerHTML = '';

    // Ẩn card gia hạn
    document.getElementById('cardGiaHan').className = 'card hidden';
    phieuHienTai = null;

    // Kiểm tra đầu vào
    if (!maPhieu) {
        hienThiLoi('ketQuaTim', 'Vui lòng nhập mã phiếu mượn!');
        return;
    }

    // Đọc danh sách phiếu mượn
    var dsPhieuMuon = JSON.parse(localStorage.getItem('danhSachPhieuMuon') || '[]');

    // Tìm phiếu theo mã
    var phieu = null;
    for (var i = 0; i < dsPhieuMuon.length; i++) {
        if (dsPhieuMuon[i].maPhieu === maPhieu) {
            phieu = dsPhieuMuon[i];
            break;
        }
    }

    // Không tìm thấy phiếu
    if (!phieu) {
        hienThiLoi('ketQuaTim',
            'Không tìm thấy phiếu mượn với mã: <strong>' + maPhieu + '</strong>');
        return;
    }

    // Phiếu đã trả, không thể gia hạn
    if (phieu.trangThai === 'Đã trả') {
        hienThiLoi('ketQuaTim',
            'Phiếu <strong>' + maPhieu + '</strong> đã được trả, không thể gia hạn!');
        return;
    }

    // Lưu phiếu và hiển thị card
    phieuHienTai = phieu;
    hienThiCardGiaHan(phieu);
    document.getElementById('cardGiaHan').className = 'card';
}

// =====================================================
// HIỂN THỊ CARD GIA HẠN VỚI THÔNG TIN ĐẦY ĐỦ
// =====================================================
function hienThiCardGiaHan(phieu) {
    var homNay = layNgayHomNay();
    var soNgayQuaHan = tinhSoNgay(phieu.hanTra, homNay);
    var quaHan = soNgayQuaHan > 0;
    var soLanGiaHan = parseInt(phieu.soLanGiaHan) || 0;

    // Hiển thị nhãn số lần gia hạn
    var badgeClass = soLanGiaHan === 0 ? 'badge-ok' : (soLanGiaHan === 1 ? 'badge-warn' : 'badge-danger');
    var soLanHtml = '<span class="badge ' + badgeClass + '">'
        + soLanGiaHan + '/2 lần gia hạn</span>';

    // Hiển thị trạng thái hạn trả
    var hanTraHtml = quaHan
        ? dinhDangNgay(phieu.hanTra) + ' <span style="color:#D32F2F;">(Quá hạn ' + soNgayQuaHan + ' ngày)</span>'
        : dinhDangNgay(phieu.hanTra) + ' <span style="color:#388E3C;">(Còn hạn)</span>';

    // Xây dựng HTML thông tin phiếu
    document.getElementById('thongTinPhieu').innerHTML = '<div class="info-box">'
        + '<p><strong>Mã phiếu:</strong> ' + phieu.maPhieu + '</p>'
        + '<p><strong>Độc giả:</strong> ' + phieu.tenDG + ' (' + phieu.maDG + ')</p>'
        + '<p><strong>Ngày mượn:</strong> ' + dinhDangNgay(phieu.ngayMuon)
        + ' &nbsp;|&nbsp; <strong>Hạn trả hiện tại:</strong> ' + hanTraHtml + '</p>'
        + '<p><strong>Số lần đã gia hạn:</strong> ' + soLanHtml + '</p>'
        + '<p><strong>Số sách:</strong> ' + phieu.danhSachSach.length + ' cuốn</p>'
        + '</div>';

    var khuGiaHan = document.getElementById('khuGiaHan');
    var khuNut = document.getElementById('khuNutGiaHan');

    // ---- Kiểm tra điều kiện gia hạn ----

    // Trường hợp 1: Đã gia hạn tối đa 2 lần
    if (soLanGiaHan >= 2) {
        khuGiaHan.innerHTML = '<div class="error-box">'
            + '🚫 Phiếu này đã được gia hạn <strong>' + soLanGiaHan + ' lần</strong> '
            + '(tối đa 2 lần). Không thể gia hạn thêm!</div>';
        khuNut.innerHTML = '<button class="btn btn-gray" onclick="resetTrang()">🔄 Tìm phiếu khác</button>';
        return;
    }

    // Trường hợp 2: Đã quá hạn
    if (quaHan) {
        khuGiaHan.innerHTML = '<div class="error-box">'
            + '⚠️ Phiếu mượn đã <strong>quá hạn ' + soNgayQuaHan + ' ngày</strong>. '
            + 'Không thể gia hạn khi đã quá hạn! Vui lòng thực hiện trả sách và đóng phạt.</div>';
        khuNut.innerHTML = '<button class="btn btn-gray" onclick="resetTrang()">🔄 Tìm phiếu khác</button>'
            + ' <a href="tra-sach.html" class="btn btn-primary" style="text-decoration:none;margin-left:10px;">'
            + '↩️ Đến trang Trả sách</a>';
        return;
    }

    // Trường hợp 3: Đủ điều kiện gia hạn
    // Hiển thị form chọn số ngày gia hạn
    khuGiaHan.innerHTML = '<div class="gian-han-box">'
        + '<div class="row-info">'
        + '<div class="label-col">Hạn trả hiện tại:</div>'
        + '<div class="value-col"><strong>' + dinhDangNgay(phieu.hanTra) + '</strong></div>'
        + '</div>'
        + '<div class="row-info">'
        + '<div class="label-col">Số ngày gia hạn thêm:</div>'
        + '<div class="value-col">'
        + '<select id="soNgayGiaHan" onchange="capNhatNgayMoi()" '
        + 'style="width:180px;padding:6px;border:1px solid #90CAF9;border-radius:4px;">'
        + '<option value="7">7 ngày</option>'
        + '<option value="14" selected>14 ngày</option>'
        + '</select>'
        + '</div>'
        + '</div>'
        + '<div class="row-info">'
        + '<div class="label-col">Hạn trả mới:</div>'
        + '<div class="value-col ngay-moi" id="hienThiNgayMoi">---</div>'
        + '</div>'
        + '<div class="row-info">'
        + '<div class="label-col">Lần gia hạn này là:</div>'
        + '<div class="value-col">'
        + '<strong>Lần ' + (soLanGiaHan + 1) + '/2</strong>'
        + (soLanGiaHan + 1 === 2
            ? ' <span style="color:#E65100;">(Lần cuối được gia hạn)</span>'
            : '')
        + '</div>'
        + '</div>'
        + '</div>'
        + '<p class="note">* Sau khi gia hạn, hạn trả sẽ được tính từ hạn trả cũ cộng thêm số ngày chọn.</p>';

    khuNut.innerHTML = '<button class="btn btn-success" onclick="xacNhanGiaHan()">✅ Xác nhận gia hạn</button>'
        + ' <button class="btn btn-gray" onclick="resetTrang()" style="margin-left:10px;">🔄 Hủy</button>';

    // Tính và hiển thị ngày mới ban đầu
    capNhatNgayMoi();
}

// =====================================================
// CẬP NHẬT HIỂN THỊ NGÀY HẠN TRẢ MỚI KHI ĐỔI SỐ NGÀY
// =====================================================
function capNhatNgayMoi() {
    if (!phieuHienTai) return;

    var selectEl = document.getElementById('soNgayGiaHan');
    var hienThiEl = document.getElementById('hienThiNgayMoi');
    if (!selectEl || !hienThiEl) return;

    var soNgay = parseInt(selectEl.value) || 14;
    // Tính ngày mới từ hạn trả cũ (không phải từ hôm nay)
    var ngayMoi = tinhNgaySau(phieuHienTai.hanTra, soNgay);
    hienThiEl.textContent = dinhDangNgay(ngayMoi)
        + ' (+' + soNgay + ' ngày)';
}

// =====================================================
// XÁC NHẬN GIA HẠN
// =====================================================
function xacNhanGiaHan() {
    if (!phieuHienTai) {
        alert('Lỗi: Chưa chọn phiếu mượn!');
        return;
    }

    var selectEl = document.getElementById('soNgayGiaHan');
    if (!selectEl) {
        alert('Lỗi: Không tìm thấy lựa chọn số ngày!');
        return;
    }

    var soNgay = parseInt(selectEl.value) || 14;
    var hanTraMoi = tinhNgaySau(phieuHienTai.hanTra, soNgay);
    var soLanGiaHan = parseInt(phieuHienTai.soLanGiaHan) || 0;

    // Xác nhận với nhân viên
    var xacNhan = confirm(
        'XÁC NHẬN GIA HẠN\n\n'
        + 'Phiếu: ' + phieuHienTai.maPhieu + '\n'
        + 'Độc giả: ' + phieuHienTai.tenDG + '\n'
        + 'Hạn trả cũ: ' + dinhDangNgay(phieuHienTai.hanTra) + '\n'
        + 'Gia hạn thêm: ' + soNgay + ' ngày\n'
        + 'Hạn trả mới: ' + dinhDangNgay(hanTraMoi) + '\n'
        + 'Đây là lần gia hạn thứ: ' + (soLanGiaHan + 1) + '/2'
    );
    if (!xacNhan) return;

    // Cập nhật phiếu mượn trong localStorage
    var dsPhieuMuon = JSON.parse(localStorage.getItem('danhSachPhieuMuon') || '[]');
    var capNhatOK = false;

    for (var i = 0; i < dsPhieuMuon.length; i++) {
        if (dsPhieuMuon[i].maPhieu === phieuHienTai.maPhieu) {
            // Lưu hạn trả cũ để tham chiếu
            dsPhieuMuon[i].hanTraCu = dsPhieuMuon[i].hanTra;
            // Cập nhật hạn trả mới
            dsPhieuMuon[i].hanTra = hanTraMoi;
            // Tăng số lần gia hạn
            dsPhieuMuon[i].soLanGiaHan = soLanGiaHan + 1;
            capNhatOK = true;
            break;
        }
    }

    if (!capNhatOK) {
        alert('Lỗi: Không thể cập nhật phiếu mượn!');
        return;
    }

    localStorage.setItem('danhSachPhieuMuon', JSON.stringify(dsPhieuMuon));

    // Thông báo thành công
    alert('✅ GIA HẠN THÀNH CÔNG!\n\n'
        + 'Phiếu: ' + phieuHienTai.maPhieu + '\n'
        + 'Độc giả: ' + phieuHienTai.tenDG + '\n'
        + 'Hạn trả mới: ' + dinhDangNgay(hanTraMoi) + '\n'
        + 'Số lần gia hạn: ' + (soLanGiaHan + 1) + '/2\n'
        + (soLanGiaHan + 1 >= 2 ? '\n⚠️ Đây là lần gia hạn cuối cùng!' : ''));

    resetTrang();
}

// =====================================================
// RESET VỀ TRẠNG THÁI BAN ĐẦU
// =====================================================
function resetTrang() {
    phieuHienTai = null;
    document.getElementById('maPhieuInput').value = '';
    document.getElementById('ketQuaTim').innerHTML = '';
    document.getElementById('cardGiaHan').className = 'card hidden';
    document.getElementById('maPhieuInput').focus();
}
</script>
