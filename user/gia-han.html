.gian-han-box .row-info { overflow: hidden; margin-bottom: 10px; }
.gian-han-box .row-info:last-child { margin-bottom: 0; }
.gian-han-box .label-col { float: left; width: 200px; font-weight: bold; color: #1565C0; font-size: 13px; line-height: 26px; }
.gian-han-box .value-col { margin-left: 200px; font-size: 14px; line-height: 26px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }
.badge-ok { background: #C8E6C9; color: #1B5E20; }

.ngay-moi { color: #1565C0; font-weight: bold; font-size: 15px; }

<div class="content">
    <div class="page-title"><h2>⏰ Gia hạn mượn sách</h2></div>

    <div class="card">
        <h3>🔍 Tìm phiếu mượn</h3>
        <div class="form-group">
            <label for="maPhieuInput">Mã phiếu mượn:</label>
            <input type="text" id="maPhieuInput" placeholder="Nhập mã phiếu (VD: PM17...)..." onkeydown="if(event.keyCode===13) timPhieuGiaHan()">
            <button class="btn btn-primary" onclick="timPhieuGiaHan()" style="margin-left:8px;">🔍 Tìm</button>
        </div>
        <div id="ketQuaTim"></div>
    </div>

    <div class="card hidden" id="cardGiaHan">
        <h3>⏰ Thông tin gia hạn</h3>
        <div id="thongTinPhieu"></div>
        <div id="khuGiaHan"></div>
        <div id="khuNutGiaHan" style="margin-top:18px;"></div>
    </div>
</div>

<script>
var phieuHienTai = null;

window.onload = function() {
    var user = localStorage.getItem('currentUser') || 'Nhân viên';
    var userInfo = JSON.parse(localStorage.getItem('currentUserInfo') || '{}');
    var tenHienThi = userInfo.hoTen || user;
    document.getElementById('tenNguoiDung').textContent = tenHienThi;
};

function layNgayHomNay() {
    var d = new Date();
    var thang = String(d.getMonth() + 1).padStart(2, '0');
    var ngay = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + thang + '-' + ngay;
}

function tinhNgaySau(ngayStr, soNgay) {
    var d = new Date(ngayStr + 'T00:00:00');
    d.setDate(d.getDate() + soNgay);
    var thang = String(d.getMonth() + 1).padStart(2, '0');
    var ngay = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + thang + '-' + ngay;
}

function dinhDangNgay(str) {
    if (!str) return '---';
    var p = str.split('-');
    if (p.length !== 3) return str;
    return p[2] + '/' + p[1] + '/' + p[0];
}

function tinhSoNgay(ngay1Str, ngay2Str) {
    var d1 = new Date(ngay1Str + 'T00:00:00');
    var d2 = new Date(ngay2Str + 'T00:00:00');
    return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
}

function hienThiLoi(idEl, msg) {
    document.getElementById(idEl).innerHTML = '<div class="error-box">⚠️ ' + msg + '</div>';
}

function timPhieuGiaHan() {
    var maPhieu = document.getElementById('maPhieuInput').value.trim();
    var elKetQua = document.getElementById('ketQuaTim');
    elKetQua.innerHTML = '';
    document.getElementById('cardGiaHan').className = 'card hidden';
    phieuHienTai = null;

    if (!maPhieu) {
        hienThiLoi('ketQuaTim', 'Vui lòng nhập mã phiếu mượn!');
        return;
    }

    var dsPhieuMuon = JSON.parse(localStorage.getItem('danhSachPhieuMuon') || '[]');
    var phieu = null;
    for (var i = 0; i < dsPhieuMuon.length; i++) {
        if (dsPhieuMuon[i].maPhieu === maPhieu) {
            phieu = dsPhieuMuon[i];
            break;
        }
    }

    if (!phieu) {
        hienThiLoi('ketQuaTim', 'Không tìm thấy phiếu mượn với mã: <strong>' + maPhieu + '</strong>');
        return;
    }

    if (phieu.trangThai === 'Đã trả') {
        hienThiLoi('ketQuaTim', 'Phiếu <strong>' + maPhieu + '</strong> đã được trả, không thể gia hạn!');
        return;
    }

    phieuHienTai = phieu;
    hienThiCardGiaHan(phieu);
    document.getElementById('cardGiaHan').className = 'card';
}

function hienThiCardGiaHan(phieu) {
    var homNay = layNgayHomNay();
    var soNgayQuaHan = tinhSoNgay(phieu.hanTra, homNay);
    var quaHan = soNgayQuaHan > 0;
    var soLanGiaHan = parseInt(phieu.soLanGiaHan) || 0;

    var badgeClass = soLanGiaHan === 0 ? 'badge-ok' : (soLanGiaHan === 1 ? 'badge-warn' : 'badge-danger');
    var soLanHtml = '<span class="badge ' + badgeClass + '">' + soLanGiaHan + '/2 lần gia hạn</span>';

    var hanTraHtml = quaHan ? dinhDangNgay(phieu.hanTra) + ' <span style="color:#D32F2F;">(Quá hạn ' + soNgayQuaHan + ' ngày)</span>' : dinhDangNgay(phieu.hanTra) + ' <span style="color:#388E3C;">(Còn hạn)</span>';

    document.getElementById('thongTinPhieu').innerHTML = '<div class="info-box">'
        + '<p><strong>Mã phiếu:</strong> ' + phieu.maPhieu + '</p>'
        + '<p><strong>Độc giả:</strong> ' + phieu.tenDG + ' (' + phieu.maDG + ')</p>'
        + '<p><strong>Ngày mượn:</strong> ' + dinhDangNgay(phieu.ngayMuon) + ' &nbsp;|&nbsp; <strong>Hạn trả hiện tại:</strong> ' + hanTraHtml + '</p>'
        + '<p><strong>Số lần đã gia hạn:</strong> ' + soLanHtml + '</p>'
        + '<p><strong>Số sách:</strong> ' + phieu.danhSachSach.length + ' cuốn</p></div>';

    var khuGiaHan = document.getElementById('khuGiaHan');
    var khuNut = document.getElementById('khuNutGiaHan');

    if (soLanGiaHan >= 2) {
        khuGiaHan.innerHTML = '<div class="error-box">🚫 Phiếu này đã được gia hạn <strong>' + soLanGiaHan + ' lần</strong> (tối đa 2 lần). Không thể gia hạn thêm!</div>';
        khuNut.innerHTML = '<button class="btn btn-gray" onclick="resetTrang()">🔄 Tìm phiếu khác</button>';
        return;
    }

    if (quaHan) {
        khuGiaHan.innerHTML = '<div class="error-box">⚠️ Phiếu mượn đã <strong>quá hạn ' + soNgayQuaHan + ' ngày</strong>. Không thể gia hạn khi đã quá hạn! Vui lòng thực hiện trả sách và đóng phạt.</div>';
        khuNut.innerHTML = '<button class="btn btn-gray" onclick="resetTrang()">🔄 Tìm phiếu khác</button> <a href="tra-sach.html" class="btn btn-primary" style="text-decoration:none;margin-left:10px;">↩️ Đến trang Trả sách</a>';
        return;
    }

    khuGiaHan.innerHTML = '<div class="gian-han-box">'
        + '<div class="row-info"><div class="label-col">Hạn trả hiện tại:</div><div class="value-col"><strong>' + dinhDangNgay(phieu.hanTra) + '</strong></div></div>'
        + '<div class="row-info"><div class="label-col">Số ngày gia hạn thêm:</div><div class="value-col">'
        + '<select id="soNgayGiaHan" onchange="capNhatNgayMoi()" style="width:180px;padding:6px;border:1px solid #90CAF9;border-radius:4px;">'
        + '<option value="7">7 ngày</option><option value="14" selected>14 ngày</option></select></div></div>'
        + '<div class="row-info"><div class="label-col">Hạn trả mới:</div><div class="value-col ngay-moi" id="hienThiNgayMoi">---</div></div>'
        + '<div class="row-info"><div class="label-col">Lần gia hạn này là:</div><div class="value-col"><strong>Lần ' + (soLanGiaHan + 1) + '/2</strong>'
        + (soLanGiaHan + 1 === 2 ? ' <span style="color:#E65100;">(Lần cuối được gia hạn)</span>' : '') + '</div></div></div>'
        + '<p class="note">* Sau khi gia hạn, hạn trả sẽ được tính từ hạn trả cũ cộng thêm số ngày chọn.</p>';

    khuNut.innerHTML = '<button class="btn btn-success" onclick="xacNhanGiaHan()">✅ Xác nhận gia hạn</button> <button class="btn btn-gray" onclick="resetTrang()" style="margin-left:10px;">🔄 Hủy</button>';
    capNhatNgayMoi();
}

function capNhatNgayMoi() {
    if (!phieuHienTai) return;
    var selectEl = document.getElementById('soNgayGiaHan');
    var hienThiEl = document.getElementById('hienThiNgayMoi');
    if (!selectEl || !hienThiEl) return;
    var soNgay = parseInt(selectEl.value) || 14;
    var ngayMoi = tinhNgaySau(phieuHienTai.hanTra, soNgay);
    hienThiEl.textContent = dinhDangNgay(ngayMoi) + ' (+' + soNgay + ' ngày)';
}

function xacNhanGiaHan() {
    if (!phieuHienTai) {
        alert('Lỗi: Chưa chọn phiếu mượn!');
        return;
    }
    var selectEl = document.getElementById('soNgayGiaHan');
    if (!selectEl) {
        alert('Lỗi: Không tìm thấy lựa chọn số ngày!');
        return;
    }

    var soNgay = parseInt(selectEl.value) || 14;
    var hanTraMoi = tinhNgaySau(phieuHienTai.hanTra, soNgay);
    var soLanGiaHan = parseInt(phieuHienTai.soLanGiaHan) || 0;

    var xacNhan = confirm('XÁC NHẬN GIA HẠN\n\nPhiếu: ' + phieuHienTai.maPhieu + '\nĐộc giả: ' + phieuHienTai.tenDG + '\nHạn trả cũ: ' + dinhDangNgay(phieuHienTai.hanTra) + '\nGia hạn thêm: ' + soNgay + ' ngày\nHạn trả mới: ' + dinhDangNgay(hanTraMoi) + '\nĐây là lần gia hạn thứ: ' + (soLanGiaHan + 1) + '/2');
    if (!xacNhan) return;

    var dsPhieuMuon = JSON.parse(localStorage.getItem('danhSachPhieuMuon') || '[]');
    var capNhatOK = false;

    for (var i = 0; i < dsPhieuMuon.length; i++) {
        if (dsPhieuMuon[i].maPhieu === phieuHienTai.maPhieu) {
            dsPhieuMuon[i].hanTraCu = dsPhieuMuon[i].hanTra;
            dsPhieuMuon[i].hanTra = hanTraMoi;
            dsPhieuMuon[i].soLanGiaHan = soLanGiaHan + 1;
            capNhatOK = true;
            break;
        }
    }

    if (!capNhatOK) {
        alert('Lỗi: Không thể cập nhật phiếu mượn!');
        return;
    }

    localStorage.setItem('danhSachPhieuMuon', JSON.stringify(dsPhieuMuon));
    alert('✅ GIA HẠN THÀNH CÔNG!\n\nPhiếu: ' + phieuHienTai.maPhieu + '\nĐộc giả: ' + phieuHienTai.tenDG + '\nHạn trả mới: ' + dinhDangNgay(hanTraMoi) + '\nSố lần gia hạn: ' + (soLanGiaHan + 1) + '/2\n' + (soLanGiaHan + 1 >= 2 ? '\n⚠️ Đây là lần gia hạn cuối cùng!' : ''));
    resetTrang();
}

function resetTrang() {
    phieuHienTai = null;
    document.getElementById('maPhieuInput').value = '';
    document.getElementById('ketQuaTim').innerHTML = '';
    document.getElementById('cardGiaHan').className = 'card hidden';
    document.getElementById('maPhieuInput').focus();
}
</script>
