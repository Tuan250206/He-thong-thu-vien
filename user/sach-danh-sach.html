<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danh Sách Sách - Thư Viện</title>
<style>
/* === RESET VÀ CƠ BẢN === */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f0f2f5; font-size: 14px; color: #333; }

/* === THANH TIÊU ĐỀ === */
#header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: #2196F3; color: white; height: 50px;
    padding: 0 20px; overflow: hidden;
}
#header h1 { float: left; font-size: 18px; line-height: 50px; font-weight: bold; }
#header .user-area { float: right; line-height: 50px; }
#header .user-area span { margin-right: 10px; font-size: 13px; }
#header .btn-logout {
    color: white; text-decoration: none;
    background: rgba(0,0,0,0.18); padding: 5px 12px;
    border-radius: 3px; font-size: 13px;
}
#header .btn-logout:hover { background: rgba(0,0,0,0.28); }

/* === THANH BÊN === */
#sidebar {
    position: fixed; top: 50px; left: 0; bottom: 0;
    width: 200px; background: #1565C0;
    overflow-y: auto; z-index: 900;
}
#sidebar a {
    display: block; color: #cce4ff; text-decoration: none;
    padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 13px;
}
#sidebar a:hover { background: #1976D2; color: white; }
#sidebar a.active {
    background: #0D47A1; color: white;
    font-weight: bold; border-left: 3px solid #64B5F6;
    padding-left: 12px;
}

/* === KHU VỰC NỘI DUNG === */
#content {
    margin-left: 200px;
    padding: 70px 20px 20px 20px;
    min-height: 100vh;
}

/* === TIÊU ĐỀ TRANG === */
.page-title {
    font-size: 22px; font-weight: bold; color: #1565C0;
    margin-bottom: 15px; padding-bottom: 10px;
    border-bottom: 2px solid #2196F3;
}

/* === THẺ NỘI DUNG === */
.card {
    background: white; border-radius: 5px; padding: 20px;
    margin-bottom: 15px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

/* === KHU VỰC TÌM KIẾM === */
.search-row { margin-bottom: 15px; overflow: hidden; }
.search-row input[type="text"] {
    float: left; padding: 8px 12px;
    border: 1px solid #ccc; border-radius: 3px;
    font-size: 14px; width: 240px; outline: none;
}
.search-row input[type="text"]:focus { border-color: #2196F3; box-shadow: 0 0 3px rgba(33,150,243,0.3); }
.search-row select {
    float: left; padding: 8px 10px; margin-left: 8px;
    border: 1px solid #ccc; border-radius: 3px;
    font-size: 14px; outline: none; background: white;
    max-width: 160px;
}
.search-row select:focus { border-color: #2196F3; }

/* === NÚT BẤM === */
.btn {
    padding: 8px 15px; border: none; border-radius: 3px;
    cursor: pointer; font-size: 13px; text-decoration: none;
    display: inline-block; line-height: normal; vertical-align: middle;
}
.btn-blue { background: #2196F3; color: white; margin-left: 8px; float: left; }
.btn-blue:hover { background: #1976D2; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-teal { background: #009688; color: white; }
.btn-teal:hover { background: #00796B; }

/* === BẢNG DỮ LIỆU === */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 700px; }
table thead tr { background: #2196F3; color: white; }
table th { padding: 10px 8px; text-align: left; font-size: 13px; white-space: nowrap; }
table td {
    padding: 8px; border-bottom: 1px solid #eee;
    font-size: 13px; vertical-align: middle;
}
table tbody tr:hover { background: #e3f2fd; }
table tbody tr:nth-child(even) { background: #fafafa; }
table tbody tr:nth-child(even):hover { background: #e3f2fd; }

/* === MÀU SỐ LƯỢNG CÒN LẠI === */
.so-luong-do { color: #D32F2F; font-weight: bold; }
.so-luong-cam { color: #E65100; font-weight: bold; }
.so-luong-xanh { color: #2E7D32; font-weight: bold; }

/* === NHÃN TRẠNG THÁI SÁCH === */
.badge {
    padding: 3px 10px; border-radius: 12px; font-size: 12px;
    font-weight: bold; display: inline-block; white-space: nowrap;
}
.badge-co-sach { background: #E8F5E9; color: #2E7D32; border: 1px solid #81C784; }
.badge-het-sach { background: #FFEBEE; color: #C62828; border: 1px solid #EF9A9A; }

/* === THÔNG BÁO === */
.no-data { text-align: center; color: #aaa; padding: 30px; font-style: italic; }
.count-info { font-size: 13px; color: #666; margin-bottom: 10px; }

/* === CLEARFIX === */
.cf::after { content: ""; display: table; clear: both; }
</style>
</head>
<body>

<!-- Thanh tiêu đề trên cùng -->
<div id="header">
    <h1>📚 Hệ Thống Thư Viện</h1>
    <div class="user-area">
        <span id="lblNguoiDung">👤 Khách</span>
        <a href="../index.html" class="btn-logout" onclick="return dangXuat()">🚪 Đăng xuất</a>
    </div>
</div>

<!-- Thanh điều hướng bên trái -->
<div id="sidebar">
    <a href="dashboard.html">🏠 Trang chủ</a>
    <a href="doc-gia-danh-sach.html">👥 DS Độc giả</a>
    <a href="doc-gia-them.html">➕ Thêm độc giả</a>
    <a href="sach-danh-sach.html" class="active">📖 DS Sách</a>
    <a href="sach-tim-kiem.html">🔍 Tìm sách</a>
    <a href="cho-muon.html">🤝 Cho mượn</a>
    <a href="tra-sach.html">↩️ Trả sách</a>
    <a href="gia-han.html">⏰ Gia hạn</a>
    <a href="xu-ly-phat.html">💰 Xử lý phạt</a>
    <a href="dat-cho.html">📌 Đặt chỗ</a>
    <a href="lich-su.html">📋 Lịch sử</a>
    <a href="thong-ke.html">📊 Thống kê</a>
</div>

<!-- Khu vực nội dung chính -->
<div id="content">
    <div class="page-title">📖 Danh Sách Sách</div>

    <div class="card">
        <!-- Thanh tìm kiếm, lọc thể loại -->
        <div class="search-row cf">
            <input type="text" id="tuKhoa"
                   placeholder="Tìm theo tên sách, tác giả..."
                   onkeypress="xuLyEnter(event)" />
            <select id="locTheLoai" onchange="timKiemSach()">
                <option value="">📂 Tất cả thể loại</option>
                <!-- Các thể loại sẽ được điền bởi JS -->
            </select>
            <button class="btn btn-blue" onclick="timKiemSach()">🔍 Tìm</button>
        </div>

        <!-- Thông tin số lượng kết quả -->
        <div class="count-info" id="lblSoLuong">Đang tải...</div>

        <!-- Bảng danh sách sách -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:40px">STT</th>
                        <th style="width:80px">Mã sách</th>
                        <th>Tên sách</th>
                        <th style="width:120px">Tác giả</th>
                        <th style="width:100px">Thể loại</th>
                        <th style="width:90px">Còn/Tổng</th>
                        <th style="width:85px">Trạng thái</th>
                        <th style="width:110px">Hành động</th>
                    </tr>
                </thead>
                <tbody id="bangSach">
                    <tr><td colspan="8" class="no-data">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
/* === KIỂM TRA ĐĂNG NHẬP === */
function kiemTraDangNhap() {
    var nguoiDung = localStorage.getItem('currentUser');
    if (!nguoiDung) {
        alert('Phiên làm việc đã hết hạn. Vui lòng đăng nhập lại!');
        window.location.href = '../index.html';
        return false;
    }
    document.getElementById('lblNguoiDung').innerHTML = '👤 ' + nguoiDung;
    return true;
}

/* === LẤY DANH SÁCH SÁCH TỪ LOCALSTORAGE === */
function layDanhSachSach() {
    var data = localStorage.getItem('danhSachSach');
    if (!data) return [];
    try { return JSON.parse(data); }
    catch (e) { return []; }
}

/* === TẢI DANH SÁCH THỂ LOẠI VÀO DROPDOWN === */
function taiTheLoai() {
    var danhSach = layDanhSachSach();
    var dsTheLoai = {};

    /* Thu thập tất cả thể loại duy nhất */
    for (var i = 0; i < danhSach.length; i++) {
        var tl = danhSach[i].theLoai;
        if (tl) dsTheLoai[tl] = true;
    }

    var sel = document.getElementById('locTheLoai');
    /* Giữ option đầu "Tất cả" và thêm các thể loại */
    var html = '<option value="">📂 Tất cả thể loại</option>';
    for (var ten in dsTheLoai) {
        html += '<option value="' + ten + '">' + ten + '</option>';
    }
    sel.innerHTML = html;
}

/* === XÁC ĐỊNH MÀU SỐ LƯỢNG CÒN LẠI === */
function mauSoLuong(soLuongCon) {
    if (soLuongCon === 0) return 'so-luong-do';
    if (soLuongCon <= 2) return 'so-luong-cam';
    return 'so-luong-xanh';
}

/* === TẢI VÀ HIỂN THỊ DANH SÁCH SÁCH === */
function taiDanhSach() {
    var danhSach = layDanhSachSach();
    var tuKhoa = document.getElementById('tuKhoa').value.trim().toLowerCase();
    var theLoaiLoc = document.getElementById('locTheLoai').value;

    /* Lọc theo từ khóa và thể loại */
    var ketQua = [];
    for (var i = 0; i < danhSach.length; i++) {
        var sach = danhSach[i];

        /* Lọc theo từ khóa nếu có nhập */
        var tuKhoaKhop = true;
        if (tuKhoa) {
            var tenKhop = sach.tenSach && sach.tenSach.toLowerCase().indexOf(tuKhoa) !== -1;
            var tacGiaKhop = sach.tacGia && sach.tacGia.toLowerCase().indexOf(tuKhoa) !== -1;
            var maKhop = sach.maSach && sach.maSach.toLowerCase().indexOf(tuKhoa) !== -1;
            tuKhoaKhop = tenKhop || tacGiaKhop || maKhop;
        }

        /* Lọc theo thể loại nếu đã chọn */
        var theLoaiKhop = !theLoaiLoc || (sach.theLoai === theLoaiLoc);

        if (tuKhoaKhop && theLoaiKhop) ketQua.push(sach);
    }

    /* Cập nhật thông tin số lượng */
    var lblSoLuong = document.getElementById('lblSoLuong');
    if (tuKhoa || theLoaiLoc) {
        lblSoLuong.innerHTML = 'Tìm thấy <strong>' + ketQua.length + '</strong> / ' + danhSach.length + ' cuốn sách';
    } else {
        lblSoLuong.innerHTML = 'Tổng số: <strong>' + danhSach.length + '</strong> đầu sách';
    }

    /* Vẽ bảng kết quả */
    var bang = document.getElementById('bangSach');
    if (ketQua.length === 0) {
        bang.innerHTML = '<tr><td colspan="8" class="no-data">⚠ Không tìm thấy sách nào phù hợp</td></tr>';
        return;
    }

    var html = '';
    for (var j = 0; j < ketQua.length; j++) {
        var s = ketQua[j];
        var soLuongCon = parseInt(s.soLuongCon, 10) || 0;
        var soLuongTong = parseInt(s.soLuongTong, 10) || 0;
        var classColor = mauSoLuong(soLuongCon);

        /* Xác định trạng thái sách */
        var trangThai = soLuongCon > 0 ? 'Còn sách' : 'Hết sách';
        var badgeClass = soLuongCon > 0 ? 'badge-co-sach' : 'badge-het-sach';

        html += '<tr>';
        html += '<td>' + (j + 1) + '</td>';
        html += '<td><strong>' + (s.maSach || '') + '</strong></td>';
        html += '<td>' + (s.tenSach || '') + '</td>';
        html += '<td>' + (s.tacGia || '') + '</td>';
        html += '<td>' + (s.theLoai || '') + '</td>';
        html += '<td><span class="' + classColor + '">' + soLuongCon + '</span> / ' + soLuongTong + '</td>';
        html += '<td><span class="badge ' + badgeClass + '">' + trangThai + '</span></td>';
        html += '<td>';
        html += '<a href="sach-chi-tiet.html?ma=' + encodeURIComponent(s.maSach) + '" class="btn btn-sm btn-teal">🔍 Chi tiết</a>';
        html += '</td>';
        html += '</tr>';
    }
    bang.innerHTML = html;
}

/* === HÀM TÌM KIẾM SÁCH === */
function timKiemSach() {
    taiDanhSach();
}

/* === XỬ LÝ PHÍM ENTER === */
function xuLyEnter(event) {
    if (event.keyCode === 13) timKiemSach();
}

/* === HÀM ĐĂNG XUẤT === */
function dangXuat() {
    if (confirm('Bạn có muốn đăng xuất không?')) {
        localStorage.removeItem('currentUser');
        window.location.href = '../index.html';
    }
    return false;
}

/* === KHỞI TẠO TRANG === */
if (kiemTraDangNhap()) {
    taiTheLoai();
    taiDanhSach();
}
</script>
</body>
</html>
